    const maxX = Math.max.apply(null, boxes.map(function (box) { return box.x + box.w; }));
    const minY = Math.min.apply(null, boxes.map(function (box) { return box.y; }));
    const maxY = Math.max.apply(null, boxes.map(function (box) { return box.y + box.h; }));
    if (mode === 'midX') {
      boxes.forEach(function (box) {
        values.push(Math.max(8, box.y - ROUTE_GUTTER));
        values.push(Math.min(canvasH - 8, box.y + box.h + ROUTE_GUTTER));
      });
      values.push.apply(values, gapMidpoints(boxes.map(function (box) { return { start: box.y, end: box.y + box.h }; })));
      values.push(Math.max(8, minY - ROUTE_GUTTER), Math.min(canvasH - 8, maxY + ROUTE_GUTTER));
    } else {
      boxes.forEach(function (box) {
        values.push(Math.max(8, box.x - ROUTE_GUTTER));
        values.push(Math.min(canvasW - 8, box.x + box.w + ROUTE_GUTTER));
      });
      values.push.apply(values, gapMidpoints(boxes.map(function (box) { return { start: box.x, end: box.x + box.w }; })));
      values.push(Math.max(8, minX - ROUTE_GUTTER), Math.min(canvasW - 8, maxX + ROUTE_GUTTER));
    }
  }

  (blockerIds || []).forEach(function (blockerId) {
    const box = boxesById.get(blockerId);
    if (!box) return;
    if (mode === 'midX') {
      values.push(Math.max(8, box.y - ROUTE_GUTTER));
      values.push(Math.min(canvasH - 8, box.y + box.h + ROUTE_GUTTER));
    } else {
      values.push(Math.max(8, box.x - ROUTE_GUTTER));
      values.push(Math.min(canvasW - 8, box.x + box.w + ROUTE_GUTTER));
    }
  });

  return expandLaneBundleCandidates(values, minAxis, maxAxis).sort(function (a, b) {
    const excursionA = detourExcursionPenalty(mode, a, startStub, endStub);
    const excursionB = detourExcursionPenalty(mode, b, startStub, endStub);
    if (excursionA !== excursionB) return excursionA - excursionB;
    const baselineDeltaA = Math.abs(a - baseline);
    const baselineDeltaB = Math.abs(b - baseline);
    if (baselineDeltaA !== baselineDeltaB) return baselineDeltaA - baselineDeltaB;
    return a - b;
  });
}

function candidateLaneValues(mode, defaultLane, boxesById, canvasW, canvasH, startStub, endStub) {
  const values = [defaultLane];
  const minAxis = 8;
  const maxAxis = mode === 'midX' ? canvasW - 8 : canvasH - 8;
  const boxes = Array.from(boxesById.values());
  if (!boxes.length) return values;

  const minX = Math.min.apply(null, boxes.map(function (box) { return box.x; }));
  const maxX = Math.max.apply(null, boxes.map(function (box) { return box.x + box.w; }));
  const minY = Math.min.apply(null, boxes.map(function (box) { return box.y; }));
  const maxY = Math.max.apply(null, boxes.map(function (box) { return box.y + box.h; }));

  if (mode === 'midX') {
    boxes.forEach(function (box) {
      values.push(Math.max(8, box.x - ROUTE_GUTTER));
      values.push(Math.min(canvasW - 8, box.x + box.w + ROUTE_GUTTER));
    });
    values.push.apply(values, gapMidpoints(boxes.map(function (box) { return { start: box.x, end: box.x + box.w }; })));
    values.push(Math.max(8, minX - ROUTE_GUTTER), Math.min(canvasW - 8, maxX + ROUTE_GUTTER));
  } else {
    boxes.forEach(function (box) {
      values.push(Math.max(8, box.y - ROUTE_GUTTER));
      values.push(Math.min(canvasH - 8, box.y + box.h + ROUTE_GUTTER));
    });
    values.push.apply(values, gapMidpoints(boxes.map(function (box) { return { start: box.y, end: box.y + box.h }; })));
    values.push(Math.max(8, minY - ROUTE_GUTTER), Math.min(canvasH - 8, maxY + ROUTE_GUTTER));
  }

  return expandLaneBundleCandidates(values, minAxis, maxAxis).sort(function (a, b) {
    const excursionA = laneExcursionPenalty(mode, a, startStub, endStub);
    const excursionB = laneExcursionPenalty(mode, b, startStub, endStub);
    if (excursionA !== excursionB) return excursionA - excursionB;
    const deltaA = Math.abs(a - defaultLane);
    const deltaB = Math.abs(b - defaultLane);
    if (deltaA !== deltaB) return deltaA - deltaB;
    return a - b;
  });
}

function bestRelationshipRoutePoints(relId, srcId, dstId, start, end, srcSide, dstSide, boxesById, canvasW, canvasH, portInfo, usedBundleLanes) {
  const srcBox = boxesById.get(srcId) || null;
  const dstBox = boxesById.get(dstId) || null;
  const startStub = offsetPointForSide(start, srcSide, EDGE_EGRESS_STUB);
  const endStub = offsetPointForSide(end, dstSide, EDGE_EGRESS_STUB);
  const sourceLaneBias = portInfo && isFinite(portInfo.sourceLaneBias) ? portInfo.sourceLaneBias : 0;
  const targetLaneBias = portInfo && isFinite(portInfo.targetLaneBias) ? portInfo.targetLaneBias : 0;
  let offset = Math.abs(targetLaneBias) > ROUTING_EPSILON ? targetLaneBias : 0;
  if (Math.abs(offset) <= ROUTING_EPSILON && Math.abs(sourceLaneBias) > ROUTING_EPSILON) offset = sourceLaneBias;
  if (Math.abs(offset) <= ROUTING_EPSILON) offset = ((stableNumberForText(relId) % 5) - 2) * ROUTE_BUNDLE_SPACING;
  const mode = routeMode(srcSide, dstSide);
  const defaultLane = mode === 'midX'
    ? (startStub.x + endStub.x) / 2 + offset
    : (startStub.y + endStub.y) / 2 + offset;
  const ignoreIds = new Set([srcId, dstId]);
  const laneCandidates = candidateLaneValues(mode, defaultLane, boxesById, canvasW, canvasH, startStub, endStub);
  let best = null;

  for (const laneValue of laneCandidates) {
    const candidate = collapseOrthogonalPoints(buildRoutePoints(start, startStub, endStub, end, laneValue, mode));
    const blockerCount = routeBlockerCount(candidate, boxesById, ignoreIds);
    const endpointPenalty = routeEndpointInteriorPenalty(candidate, srcBox, dstBox);
    const clearance = routeMinClearance(candidate, boxesById, ignoreIds);
    const score = [
      blockerCount,
      endpointPenalty,
      Math.max(0, ROUTE_CLEARANCE_TARGET - clearance),
      routeLaneReusePenalty(usedBundleLanes, laneValue),
      laneExcursionPenalty(mode, laneValue, startStub, endStub),
      approximateRouteLength(candidate),
      Math.abs(laneValue - defaultLane),
      0
    ];
    if (isBetterRouteScore(score, best && best.score)) {
      best = {
        points: candidate,
        score: score,
        blockerCount: blockerCount,
        endpointPenalty: endpointPenalty,
        blockerIds: null,
        laneValue: laneValue,
        clearance: clearance,
        routeLength: approximateRouteLength(candidate)
      };
      if (blockerCount === 0 && endpointPenalty === 0 && clearance >= ROUTE_CLEARANCE_TARGET) return best;
    }
  }

  if (best && (best.blockerCount > 0 || best.endpointPenalty > 0 || best.clearance < ROUTE_CLEARANCE_TARGET)) {
    const blockerIds = [];
    boxesById.forEach(function (box, nodeId) {
      if (ignoreIds.has(nodeId)) return;
      const expanded = expandBoxForRouting(box, ROUTE_CLEARANCE);
      for (let idx = 0; idx < best.points.length - 1; idx += 1) {
        if (segmentIntersectsExpandedBox(best.points[idx], best.points[idx + 1], expanded)) {
          blockerIds.push(nodeId);
          return;
        }
      }
    });

    const laneTrials = dedupeLaneValues([best.laneValue, defaultLane].concat(laneCandidates.slice(0, 8)));
    const detourValues = detourAxisValues(mode, blockerIds, boxesById, canvasW, canvasH, startStub, endStub);
    for (const laneValue of laneTrials) {
      for (const detourValue of detourValues) {
        const candidate = collapseOrthogonalPoints(buildDetourRoutePoints(start, startStub, endStub, end, laneValue, detourValue, mode));
        const blockerCount = routeBlockerCount(candidate, boxesById, ignoreIds);
        const endpointPenalty = routeEndpointInteriorPenalty(candidate, srcBox, dstBox);
        const clearance = routeMinClearance(candidate, boxesById, ignoreIds);
        const score = [
          blockerCount,
          endpointPenalty,
          Math.max(0, ROUTE_CLEARANCE_TARGET - clearance),
          routeLaneReusePenalty(usedBundleLanes, laneValue),
          laneExcursionPenalty(mode, laneValue, startStub, endStub),
          detourExcursionPenalty(mode, detourValue, startStub, endStub),
          approximateRouteLength(candidate),
          Math.abs(laneValue - defaultLane),
          Math.abs(detourValue - detourBaselineCoordinate(mode, startStub, endStub))
        ];
        if (isBetterRouteScore(score, best && best.score)) {
          best = {
            points: candidate,
            score: score,
            blockerCount: blockerCount,
            endpointPenalty: endpointPenalty,
            blockerIds: blockerIds,
            laneValue: laneValue,
            clearance: clearance,
            routeLength: approximateRouteLength(candidate)
          };
          if (blockerCount === 0 && endpointPenalty === 0 && clearance >= ROUTE_CLEARANCE_TARGET) return best;
        }
      }
    }
  }

  const fallback = collapseOrthogonalPoints(buildRoutePoints(start, startStub, endStub, end, defaultLane, mode));
  return best || {
    points: fallback,
    score: null,
    blockerCount: routeBlockerCount(fallback, boxesById, ignoreIds),
    endpointPenalty: routeEndpointInteriorPenalty(fallback, srcBox, dstBox),
    blockerIds: null,
    laneValue: defaultLane,
    clearance: routeMinClearance(fallback, boxesById, ignoreIds),
    routeLength: approximateRouteLength(fallback)
  };
}

function relationshipRoutePoints(srcBox, dstBox, relId, boxesById, canvasW, canvasH, portInfo, srcId, dstId, laneUsage) {
  const srcSide = (portInfo && portInfo.sourceSide) || preferredPortSide(srcBox, dstBox);
  const dstSide = (portInfo && portInfo.targetSide) || preferredPortSide(dstBox, srcBox);
  const start = (portInfo && portInfo.sourceAnchor) || sideAnchorPoint(srcBox, srcSide);
  const end = (portInfo && portInfo.targetAnchor) || sideAnchorPoint(dstBox, dstSide);
  const mode = routeMode(srcSide, dstSide);
  const bundleKey = routeBundleKey(srcId, dstId, srcSide, dstSide, mode, portInfo);
  const route = bestRelationshipRoutePoints(
    relId,
    srcId,
    dstId,
    start,
    end,
    srcSide,
    dstSide,
    boxesById,
    canvasW,
    canvasH,
    portInfo,
    laneUsage && bundleKey ? laneUsage.get(bundleKey) || [] : []
  );
  rememberRouteLane(laneUsage, bundleKey, route.laneValue);
  return route.points;
}

function roundedPolylinePathData(points, radius) {
  const pathPoints = points || [];
  const cornerRadius = isFinite(radius) ? radius : 10;
  if (pathPoints.length < 2) return '';

  const path = ['M ' + pathPoints[0].x.toFixed(1) + ' ' + pathPoints[0].y.toFixed(1)];
  for (let idx = 1; idx < pathPoints.length - 1; idx += 1) {
    const prev = pathPoints[idx - 1];
    const cur = pathPoints[idx];
    const next = pathPoints[idx + 1];

    const inDx = cur.x - prev.x;
    const inDy = cur.y - prev.y;
    const outDx = next.x - cur.x;
    const outDy = next.y - cur.y;
    const inLen = Math.hypot(inDx, inDy) || 1;
    const outLen = Math.hypot(outDx, outDy) || 1;
    const r = Math.min(cornerRadius, inLen / 2, outLen / 2);

    const sx = cur.x - (inDx / inLen) * r;
    const sy = cur.y - (inDy / inLen) * r;
    const ex = cur.x + (outDx / outLen) * r;
    const ey = cur.y + (outDy / outLen) * r;

    path.push('L ' + sx.toFixed(1) + ' ' + sy.toFixed(1));
    path.push('Q ' + cur.x.toFixed(1) + ' ' + cur.y.toFixed(1) + ' ' + ex.toFixed(1) + ' ' + ey.toFixed(1));
  }

  const last = pathPoints[pathPoints.length - 1];
  path.push('L ' + last.x.toFixed(1) + ' ' + last.y.toFixed(1));
  return path.join(' ');
}

function labelPlacementForPolyline(points) {
  const pathPoints = points || [];
  if (pathPoints.length < 2) return { x: 0, y: 0 };

  let best = null;
  for (let idx = 0; idx < pathPoints.length - 1; idx += 1) {
    const start = pathPoints[idx];
    const end = pathPoints[idx + 1];
    const length = Math.hypot(end.x - start.x, end.y - start.y);
    if (!best || length > best.length) {
      best = { length: length, start: start, end: end };
    }
  }
  if (!best) return { x: 0, y: 0 };

  const lx = (best.start.x + best.end.x) / 2;
  const ly = (best.start.y + best.end.y) / 2;
  const length = best.length || 1;
  const nx = -((best.end.y - best.start.y) / length);
  const ny = (best.end.x - best.start.x) / length;
  return {
    x: lx + nx * 8,
    y: ly + ny * 8
  };
}

function appendEdgeLabel(edgeGroup, tx, ty, labelText) {
  const lines = wrapEdgeLabelLines(labelText);
  if (!lines.length) return null;

  const labelGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  labelGroup.setAttribute('class', 'edge-label');
  labelGroup.setAttribute('data-edge-label', 'true');

  const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text.setAttribute('x', String(tx));
  text.setAttribute('y', String(ty));
  text.setAttribute('text-anchor', 'middle');
  text.setAttribute('font-size', '11');
  text.setAttribute('fill', THEME.textTertiary);

  const lineHeight = 13;
  const startY = ty - ((lines.length - 1) * lineHeight) / 2;
  lines.forEach(function (line, idx) {
    const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
    tspan.setAttribute('x', String(tx));
    tspan.setAttribute('y', String(startY + idx * lineHeight));
    tspan.setAttribute('dominant-baseline', 'middle');
    tspan.textContent = line;
    text.appendChild(tspan);
  });

  labelGroup.appendChild(text);
  edgeGroup.appendChild(labelGroup);
  return labelGroup;
}

function finalizeEdgeLabelMask(labelGroup) {
  if (!labelGroup) return;
}

function updateEdgeLabelPosition(labelGroup, tx, ty) {
  if (!labelGroup) return;
  const text = labelGroup.querySelector('text');
  if (!text) return;

  const tspans = Array.from(text.querySelectorAll('tspan'));
  const lineHeight = 13;
  const lineCount = tspans.length || 1;
  const startY = ty - ((lineCount - 1) * lineHeight) / 2;
  text.setAttribute('x', String(tx));
  text.setAttribute('y', String(startY));

  if (!tspans.length) {
    text.setAttribute('dominant-baseline', 'middle');
    return;
  }

  tspans.forEach(function (tspan, idx) {
    tspan.setAttribute('x', String(tx));
    tspan.setAttribute('y', String(startY + idx * lineHeight));
    tspan.setAttribute('dominant-baseline', 'middle');
  });
}

function svgViewBoxRect(svg) {
  if (!svg) return null;
  const raw = String(svg.getAttribute('viewBox') || '').trim().split(/\s+/).map(Number);
  if (raw.length === 4 && raw.every(function (value) { return isFinite(value); })) {
    return { x: raw[0], y: raw[1], width: raw[2], height: raw[3] };
  }
  const width = parseFloat(svg.getAttribute('width') || '0');
  const height = parseFloat(svg.getAttribute('height') || '0');
  if (isFinite(width) && isFinite(height) && width > 0 && height > 0) {
    return { x: 0, y: 0, width: width, height: height };
  }
  return null;
}

function inflateRect(rect, padX, padY) {
  if (!rect) return null;
  const dx = isFinite(padX) ? padX : 0;
  const dy = isFinite(padY) ? padY : dx;
  return {
    x: rect.x - dx,
    y: rect.y - dy,
    width: rect.width + dx * 2,
    height: rect.height + dy * 2
  };
}

function rectsIntersect(a, b) {
  if (!a || !b) return false;
  return !(
    a.x + a.width <= b.x
    || b.x + b.width <= a.x
    || a.y + a.height <= b.y
    || b.y + b.height <= a.y
  );
}

function rectContainsPoint(rect, point) {
  if (!rect || !point) return false;
  return (
    point.x >= rect.x
    && point.x <= rect.x + rect.width
    && point.y >= rect.y
    && point.y <= rect.y + rect.height
  );
}

function rectInsideBounds(rect, bounds, margin) {
  if (!rect || !bounds) return false;
  const pad = isFinite(margin) ? margin : 0;
  return (
    rect.x >= bounds.x + pad
    && rect.y >= bounds.y + pad
    && rect.x + rect.width <= bounds.x + bounds.width - pad
    && rect.y + rect.height <= bounds.y + bounds.height - pad
  );
}

function geometryAtLength(geometry, length) {
  try {
    return geometry.getPointAtLength(length);
  } catch (_err) {
    return null;
  }
}

function geometryTotalLength(geometry) {
  try {
    const total = geometry.getTotalLength();
    return isFinite(total) ? total : 0;
  } catch (_err) {
    return 0;
  }
}

function sampleGeometryPoints(geometry, spacing) {
  const totalLength = geometryTotalLength(geometry);
  if (!totalLength) return [];

  const step = Math.max(6, spacing || EDGE_LABEL_SEGMENT_SAMPLE_STEP);
  const samples = [];
  for (let distance = 0; distance <= totalLength; distance += step) {
    const point = geometryAtLength(geometry, Math.min(distance, totalLength));
    if (point) samples.push({ x: point.x, y: point.y });
  }
  const finalPoint = geometryAtLength(geometry, totalLength);
  if (finalPoint) {
    const previous = samples[samples.length - 1];
    if (!previous || Math.hypot(finalPoint.x - previous.x, finalPoint.y - previous.y) > 0.5) {
      samples.push({ x: finalPoint.x, y: finalPoint.y });
    }
  }
  return samples;
}

function relationshipVisibleGeometry(group) {
  if (!group) return null;
  return Array.from(group.querySelectorAll('path,line,polyline')).find(function (shape) {
    if (shape.closest('[data-edge-label="true"]')) return false;
    const stroke = String(shape.getAttribute('stroke') || '').trim().toLowerCase();
    return stroke && stroke !== 'none' && stroke !== 'transparent';
  }) || null;
}

function relationshipLabelText(group) {
  if (!group) return '';
  const relId = group.getAttribute('data-relationship-id') || '';
  const rel = relId ? relationshipsById.get(relId) : null;
  return normalizeEdgeLabelText(
    (rel && rel.label)
    || group.getAttribute('data-target-label')
    || relId
    || 'Relationship'
  );
}

function ensureRelationshipTooltip(group, text) {
  if (!group) return '';
  const tooltipText = normalizeEdgeLabelText(text) || 'Relationship';
  group.setAttribute('data-tooltip-text', tooltipText);
  group.setAttribute('aria-label', tooltipText);
  group.querySelectorAll('title').forEach(function (title) { title.remove(); });
  return tooltipText;
}

function removeRelationshipLabel(group) {
  if (!group) return;
  group.querySelectorAll('[data-edge-label="true"]').forEach(function (el) {
    el.remove();
  });
}

function hideEdgeTooltip() {
  const tooltip = $('edgeTooltip');
  if (!tooltip) return;
  tooltip.setAttribute('data-visible', 'false');
  tooltip.setAttribute('aria-hidden', 'true');
  tooltip.textContent = '';
  state.edgeTooltipRelationshipId = null;
  clearEdgeHoverFocus();
}

function clearEdgeTooltipTimer() {
  if (state.edgeTooltipTimer) {
    clearTimeout(state.edgeTooltipTimer);
    state.edgeTooltipTimer = null;
  }
  state.edgeTooltipPending = null;
}

function dismissEdgeTooltip() {
  clearEdgeTooltipTimer();
  hideEdgeTooltip();
}

function clampTooltipPosition(left, top, rect) {
  return {
    left: clamp(left, EDGE_TOOLTIP_VIEWPORT_PAD, window.innerWidth - rect.width - EDGE_TOOLTIP_VIEWPORT_PAD),
    top: clamp(top, EDGE_TOOLTIP_VIEWPORT_PAD, window.innerHeight - rect.height - EDGE_TOOLTIP_VIEWPORT_PAD),
  };
}

function positionEdgeTooltip(clientX, clientY) {
  const tooltip = $('edgeTooltip');
  if (!tooltip || tooltip.getAttribute('data-visible') !== 'true') return;

  const rect = tooltip.getBoundingClientRect();
  const next = clampTooltipPosition(
    clientX - rect.width / 2,
    clientY - rect.height - EDGE_TOOLTIP_CURSOR_GAP,
    rect
  );
  tooltip.style.left = String(Math.round(next.left)) + 'px';
  tooltip.style.top = String(Math.round(next.top)) + 'px';
}

function showEdgeTooltip(text, clientX, clientY, relationshipId) {
  const tooltipText = normalizeEdgeLabelText(text);
  if (!tooltipText || isCommentMode()) {
    dismissEdgeTooltip();
    return;
  }

  const tooltip = $('edgeTooltip');
  if (!tooltip) return;
  tooltip.textContent = tooltipText;
  tooltip.setAttribute('data-visible', 'true');
  tooltip.setAttribute('aria-hidden', 'false');
  state.edgeTooltipRelationshipId = relationshipId || null;
  applyEdgeHoverFocus(findDataBoundElement(currentDiagramSvg(), 'data-relationship-id', relationshipId));
  positionEdgeTooltip(clientX, clientY);
}

function scheduleEdgeTooltip(text, clientX, clientY, relationship) {
  const tooltipText = normalizeEdgeLabelText(text);
  const relationshipId = relationship && relationship.getAttribute('data-relationship-id');
  if (!tooltipText || !relationshipId || isCommentMode()) {
    dismissEdgeTooltip();
    return;
  }

  const tooltip = $('edgeTooltip');
  if (
    tooltip
    && tooltip.getAttribute('data-visible') === 'true'
    && state.edgeTooltipRelationshipId === relationshipId
  ) {
    showEdgeTooltip(tooltipText, clientX, clientY, relationshipId);
    return;
  }

  if (state.edgeTooltipPending && state.edgeTooltipPending.relationshipId === relationshipId) {
    state.edgeTooltipPending.clientX = clientX;
    state.edgeTooltipPending.clientY = clientY;
    state.edgeTooltipPending.text = tooltipText;
    return;
  }

  clearEdgeTooltipTimer();
  hideEdgeTooltip();
  state.edgeTooltipPending = {
    relationshipId: relationshipId,
    text: tooltipText,
    clientX: clientX,
    clientY: clientY,
  };
  state.edgeTooltipTimer = setTimeout(function () {
    const pending = state.edgeTooltipPending;
    clearEdgeTooltipTimer();
    if (!pending) return;
    showEdgeTooltip(pending.text, pending.clientX, pending.clientY, pending.relationshipId);
  }, EDGE_TOOLTIP_HOVER_DELAY);
}

function relationshipLabelCandidates(geometry, totalLength) {
  const tangentDelta = 8;
  const candidates = [];
  EDGE_LABEL_SAMPLE_RATIOS.forEach(function (ratio) {
    const anchorLength = Math.max(tangentDelta, Math.min(totalLength - tangentDelta, totalLength * ratio));
    const centerPoint = geometryAtLength(geometry, anchorLength);
    const before = geometryAtLength(geometry, Math.max(0, anchorLength - tangentDelta));
    const after = geometryAtLength(geometry, Math.min(totalLength, anchorLength + tangentDelta));
    if (!centerPoint || !before || !after) return;

    const dx = after.x - before.x;
    const dy = after.y - before.y;
    const magnitude = Math.hypot(dx, dy) || 1;
    const tangent = { x: dx / magnitude, y: dy / magnitude };
    const normal = { x: -tangent.y, y: tangent.x };

    EDGE_LABEL_NORMAL_OFFSETS.forEach(function (normalOffset) {
      EDGE_LABEL_TANGENT_SHIFTS.forEach(function (tangentShift) {
        candidates.push({
          x: centerPoint.x + normal.x * normalOffset + tangent.x * tangentShift,
          y: centerPoint.y + normal.y * normalOffset + tangent.y * tangentShift,
          weight: Math.abs(normalOffset) + Math.abs(tangentShift) + Math.abs(ratio - 0.5) * 100
        });
      });
    });
  });
  return candidates.sort(function (a, b) { return a.weight - b.weight; });
}

function edgeLabelCollides(rect, relationshipInfo, allRelationships, nodeRects, placedLabelRects) {
  if (!rect) return true;

  if (nodeRects.some(function (nodeRect) { return rectsIntersect(rect, nodeRect); })) return true;
  if (placedLabelRects.some(function (labelRect) { return rectsIntersect(rect, labelRect); })) return true;

  return allRelationships.some(function (other) {
    const points = other.samplePoints || [];
    const sampleRect = other.id === relationshipInfo.id
      ? inflateRect(rect, 1, 1)
      : inflateRect(rect, 3, 3);
    return points.some(function (point) {
      return rectContainsPoint(sampleRect, point);
    });
  });
}

function layoutRelationshipLabels(svg) {
  if (!svg) return;

  const viewBounds = svgViewBoxRect(svg);
  const nodeRects = Array.from(svg.querySelectorAll('[data-element-id]'))
    .map(function (group) { return inflateRect(elementBBox(group), 8, 6); })
    .filter(Boolean);

  const relationships = Array.from(svg.querySelectorAll('[data-relationship-id]')).map(function (group) {
    const geometry = relationshipVisibleGeometry(group);
    const labelText = relationshipLabelText(group);
    const id = group.getAttribute('data-relationship-id') || '';
    ensureRelationshipTooltip(group, labelText);
    return {
      id: id,
      group: group,
      geometry: geometry,
      labelText: labelText,
      totalLength: geometry ? geometryTotalLength(geometry) : 0,
      samplePoints: geometry ? sampleGeometryPoints(geometry, EDGE_LABEL_SEGMENT_SAMPLE_STEP) : []
    };
  }).filter(function (info) {
    return info.geometry;
  }).sort(function (a, b) {
    if (b.totalLength !== a.totalLength) return b.totalLength - a.totalLength;
    return a.labelText.length - b.labelText.length;
  });

  const placedLabelRects = [];
  relationships.forEach(function (info) {
    removeRelationshipLabel(info.group);

    if (!info.labelText || info.totalLength < EDGE_LABEL_MIN_PATH_LENGTH) return;

    const measuringGroup = appendEdgeLabel(info.group, EDGE_LABEL_MEASURE_X, EDGE_LABEL_MEASURE_Y, info.labelText);
    if (!measuringGroup) return;

    const measured = elementBBox(measuringGroup);
    if (!measured || !measured.width || !measured.height) {
      measuringGroup.remove();
      return;
    }

    if (info.totalLength < Math.max(EDGE_LABEL_MIN_PATH_LENGTH, measured.width * 0.8)) {
      measuringGroup.remove();
      return;
    }

    const candidates = relationshipLabelCandidates(info.geometry, info.totalLength);
    let chosenRect = null;
    for (let idx = 0; idx < candidates.length; idx += 1) {
      const candidate = candidates[idx];
      updateEdgeLabelPosition(measuringGroup, candidate.x, candidate.y);
      const currentRect = inflateRect(elementBBox(measuringGroup), EDGE_LABEL_COLLISION_PAD_X, EDGE_LABEL_COLLISION_PAD_Y);
      if (!currentRect) continue;
      if (!rectInsideBounds(currentRect, viewBounds, 2)) continue;
      if (edgeLabelCollides(currentRect, info, relationships, nodeRects, placedLabelRects)) continue;
      chosenRect = currentRect;
      break;
    }

    if (!chosenRect) {
      measuringGroup.remove();
      return;
    }

    placedLabelRects.push(chosenRect);
  });
}

function runRelationshipLabelLayout(svg, view) {
  if (!svg || !shouldRunRuntimeRelationshipLayout(view)) return;
  measurePerf('layoutRelationshipLabels', {
    view_id: view && view.id ? view.id : '',
    perf_tier: perfTierForView(view),
  }, function () {
    layoutRelationshipLabels(svg);
  });
}

function scheduleRelationshipLabelRelayout(svg, view) {
  if (!svg || !svg.isConnected) return;
  if (!shouldRunRuntimeRelationshipLayout(view)) return;
  if (!svg.querySelector('[data-relationship-id]')) return;

  const fonts = document.fonts;
  if (!fonts || !fonts.ready || typeof fonts.ready.then !== 'function') return;
  if (fonts.status === 'loaded') return;

  const token = String((Number(svg.getAttribute('data-edge-label-layout-token') || '0') + 1));
  svg.setAttribute('data-edge-label-layout-token', token);

  fonts.ready.then(function () {
    if (!svg.isConnected) return;
    if (svg.getAttribute('data-edge-label-layout-token') !== token) return;
    runRelationshipLabelLayout(svg, view);
    if (state.pendingTarget) applyCommentTargetIndicators(svg);
  }).catch(function () {
    // ignore font loading failures; initial label placement is already rendered
  });
}

function svgDiagramNodeBoxesById(svg) {
  const boxesById = new Map();
  if (!svg) return boxesById;

  svg.querySelectorAll('[data-element-id]').forEach(function (group) {
    const elementId = group.getAttribute('data-element-id');
    if (!elementId || boxesById.has(elementId)) return;
    const rect = group.querySelector('rect:not([data-node-header="true"])') || group.querySelector('rect');
    const box = elementBBox(rect || group);
    if (!box) return;
    boxesById.set(elementId, {
      x: box.x,
      y: box.y,
      w: box.width,
      h: box.height
    });
  });

  return boxesById;
}

function setRelationshipShapePathData(shape, pathData) {
  if (!shape || !pathData) return;
  const tag = String(shape.tagName || '').toLowerCase();
  if (tag === 'path') {
    shape.setAttribute('d', pathData);
    return;
  }

  const replacement = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  Array.from(shape.attributes || []).forEach(function (attr) {
    if (attr && attr.name !== 'x1' && attr.name !== 'y1' && attr.name !== 'x2' && attr.name !== 'y2' && attr.name !== 'points') {
      replacement.setAttribute(attr.name, attr.value);
    }
  });
  replacement.setAttribute('d', pathData);
  shape.parentNode.replaceChild(replacement, shape);
}

function rerouteFragmentDiagramEdges(svg, view) {
  if (!svg || !view || view.kind !== 'diagram') return;
  if (!svg.querySelector('[data-relationship-id]') || !svg.querySelector('[data-element-id]')) return;

  const viewBounds = svgViewBoxRect(svg);
  if (!viewBounds) return;
  const boxesById = svgDiagramNodeBoxesById(svg);
  if (!boxesById.size) return;

  const edgePorts = assignEdgePorts(view.edges || [], boxesById, viewBounds.width, viewBounds.height);
  const laneUsage = new Map();
  (view.edges || []).forEach(function (edge) {
    const edgeId = edge && edge.id;
    const srcBox = edge && boxesById.get(edge.source_id);
    const dstBox = edge && boxesById.get(edge.target_id);
    const group = edgeId ? findDataBoundElement(svg, 'data-relationship-id', edgeId) : null;
    if (!edgeId || !srcBox || !dstBox || !group) return;

    const routePoints = relationshipRoutePoints(
      srcBox,
      dstBox,
      edgeId,
      boxesById,
      viewBounds.width,
      viewBounds.height,
      edgePorts.get(edgeId) || null,
      edge.source_id,
      edge.target_id,
      laneUsage
    );
    const pathData = roundedPolylinePathData(routePoints, 10);
    if (!pathData) return;

    const visibleShape = relationshipVisibleGeometry(group);
    if (visibleShape) setRelationshipShapePathData(visibleShape, pathData);

    Array.from(group.querySelectorAll('path,line,polyline')).forEach(function (shape) {
      if (shape === visibleShape) return;
      const stroke = String(shape.getAttribute('stroke') || '').trim().toLowerCase();
      if (stroke === 'transparent' || stroke === 'none') {
        setRelationshipShapePathData(shape, pathData);
      }
    });
  });
}

function shouldRerouteFragmentDiagramEdges(svg) {
  if (!svg) return false;
  return String(svg.getAttribute('data-routing-version') || '') !== FRAGMENT_ROUTING_VERSION;
}

function finalizeDiagramSvg(svg, view) {
  if (!svg) return;
  if (shouldRerouteFragmentDiagramEdges(svg)) {
    rerouteFragmentDiagramEdges(svg, view);
  }
  applySvgTheme(svg, view);
  wireSvgInteractions(svg, view);
  runRelationshipLabelLayout(svg, view);
  scheduleRelationshipLabelRelayout(svg, view);
}

function nodeHeaderBandPath(x, y, width, height, radius) {
  const usableHeight = Math.max(Number(height) || 0, 0);
  const usableRadius = Math.min(Number(radius) || 0, width / 2, usableHeight);
  return [
    'M', x + usableRadius, y,
    'H', x + width - usableRadius,
    'Q', x + width, y, x + width, y + usableRadius,
    'V', y + usableHeight,
    'H', x,
    'V', y + usableRadius,
    'Q', x, y, x + usableRadius, y,
    'Z'
  ].join(' ');
}

function ensureNodeHeaderShape(group, box) {
  if (!group || !box) return null;
  let header = group.querySelector('[data-node-header="true"]');
  if (!header) {
    header = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    header.setAttribute('data-node-header', 'true');
    header.setAttribute('pointer-events', 'none');
    const anchor = group.querySelector('text');
    if (anchor) group.insertBefore(header, anchor);
    else group.appendChild(header);
  }
  header.setAttribute('d', nodeHeaderBandPath(box.x, box.y, box.width, Math.min(NODE_HEADER_BAND_HEIGHT, box.height), 12));
  return header;
}

function simplifyPersonNodeGroup(group, node) {
  if (!group || !isPersonKind(node && node.kind)) return;

  group.querySelectorAll('circle').forEach(function (circle) {
    circle.remove();
  });

  const textEls = Array.from(group.querySelectorAll('text'));
  textEls.forEach(function (textEl) {
    if (isEmojiOnlyText(textEl.textContent || '')) {
      textEl.remove();
    }
  });

  let remainingTexts = Array.from(group.querySelectorAll('text'));
  let eyebrowText = null;
  const titleTexts = [];
  const bodyTexts = [];

  remainingTexts.forEach(function (textEl) {
    const text = String(textEl.textContent || '').trim();
    if (!text) return;
    if (text === 'Person' || text === 'User' || text === '👤 User') {
      if (eyebrowText) {
        textEl.remove();
        return;
      }
      eyebrowText = textEl;
      eyebrowText.textContent = personSubtitleText(node && node.kind);
      return;
    }
    if (nodeTextRole(textEl) === 'title') titleTexts.push(textEl);
    else bodyTexts.push(textEl);
  });

  if (!titleTexts.length && bodyTexts.length) {
    titleTexts.push(bodyTexts.shift());
  }

  if (!eyebrowText) {
    eyebrowText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    eyebrowText.textContent = personSubtitleText(node && node.kind);
    const anchor = titleTexts[0] || bodyTexts[0] || null;
    if (anchor) group.insertBefore(eyebrowText, anchor);
    else group.appendChild(eyebrowText);
  }

  const rect = group.querySelector('rect');
  const box = elementBBox(rect);
  if (!rect || !box) return;

  const eyebrowFontSize = 9;
  const titleFontSize = 14;
  const bodyFontSize = 11;
  const titleLineHeight = 18;
  const bodyLineHeight = 15;
  const eyebrowY = NODE_HEADER_BAND_HEIGHT / 2 + NODE_HEADER_TEXT_NUDGE_Y;
  const titleStartY = 42;
  const bodyStartY = titleStartY + titleTexts.length * titleLineHeight;
  const titleBottomY = titleTexts.length ? titleStartY + (titleTexts.length - 1) * titleLineHeight : titleStartY;
  const bodyBottomY = bodyTexts.length ? bodyStartY + (bodyTexts.length - 1) * bodyLineHeight : titleBottomY;

  const contentWidth = Math.max(
    estimateTextWidth(eyebrowText.textContent, eyebrowFontSize),
    titleTexts.reduce(function (maxWidth, textEl) {
      return Math.max(maxWidth, estimateTextWidth(textEl.textContent, titleFontSize));
    }, 0),
    bodyTexts.reduce(function (maxWidth, textEl) {
      return Math.max(maxWidth, estimateTextWidth(textEl.textContent, bodyFontSize));
    }, 0)
  );

  const targetWidth = Math.max(box.width, Math.ceil(contentWidth + 56), 180);
  const targetHeight = Math.max(box.height, Math.ceil(bodyBottomY + 18));
  const centerX = box.x + box.width / 2;
  const centerY = box.y + box.height / 2;
  const nextX = centerX - targetWidth / 2;
  const nextY = centerY - targetHeight / 2;

  rect.setAttribute('x', String(nextX));
  rect.setAttribute('y', String(nextY));
  rect.setAttribute('width', String(targetWidth));
  rect.setAttribute('height', String(targetHeight));

  eyebrowText.textContent = personSubtitleText(node && node.kind);
  eyebrowText.setAttribute('x', String(centerX));
  eyebrowText.setAttribute('y', String(nextY + eyebrowY));
  eyebrowText.setAttribute('text-anchor', 'middle');
  eyebrowText.setAttribute('dominant-baseline', 'middle');
  eyebrowText.setAttribute('font-size', String(eyebrowFontSize));
  eyebrowText.setAttribute('font-weight', '600');
  eyebrowText.setAttribute('pointer-events', 'none');
  eyebrowText.removeAttribute('alignment-baseline');

  titleTexts.forEach(function (textEl, idx) {
    textEl.setAttribute('x', String(centerX));
    textEl.setAttribute('y', String(nextY + titleStartY + idx * titleLineHeight));
    textEl.setAttribute('text-anchor', 'middle');
    textEl.setAttribute('font-size', String(titleFontSize));
    textEl.setAttribute('font-weight', '600');
    textEl.setAttribute('pointer-events', 'none');
    textEl.removeAttribute('dominant-baseline');
    textEl.removeAttribute('alignment-baseline');
  });

  bodyTexts.forEach(function (textEl, idx) {
    textEl.setAttribute('x', String(centerX));
    textEl.setAttribute('y', String(nextY + bodyStartY + idx * bodyLineHeight));
    textEl.setAttribute('text-anchor', 'middle');
    textEl.setAttribute('font-size', String(bodyFontSize));
    textEl.removeAttribute('font-weight');
    textEl.setAttribute('pointer-events', 'none');
    textEl.removeAttribute('dominant-baseline');
    textEl.removeAttribute('alignment-baseline');
  });
}

function applyNodeGroupTheme(group, node) {
  simplifyPersonNodeGroup(group, node);
  const palette = paletteForKind(node && node.kind);
  const elementId = group.getAttribute('data-element-id');
  const selected = state.mode === 'explore' && elementId && elementId === state.selectedId;
  const drillable = elementId && isDrillable(elementId);
  const stroke = selected || drillable ? THEME.signal : palette.color;
  const rect = group.querySelector('rect');
  const box = elementBBox(rect);
  const headerShape = ensureNodeHeaderShape(group, box);
  const cluster = nodeClusterElements(group);

  cluster.forEach(function (shape) {
    const tag = String(shape.tagName || '').toLowerCase();
    if (!['rect', 'circle', 'ellipse', 'path', 'polygon'].includes(tag)) return;
    if (shape === headerShape || shape.getAttribute('data-node-header') === 'true') {
      shape.setAttribute('fill', palette.color);
      shape.setAttribute('fill-opacity', '0.18');
      shape.removeAttribute('stroke');
      return;
    }
    if (isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('fill', palette.fill);
    }
    if (isVisiblePaint(shape.getAttribute('stroke'))) {
      if (!shape.hasAttribute('data-base-stroke-width')) {
        const existingStrokeWidth = parseFloat(shape.getAttribute('stroke-width') || '');
        shape.setAttribute(
          'data-base-stroke-width',
          String(Number.isFinite(existingStrokeWidth) ? existingStrokeWidth : 1.1)
        );
      }
      const baseStrokeWidth = parseFloat(shape.getAttribute('data-base-stroke-width') || '1.1');
      shape.setAttribute('stroke', stroke);
      if (selected) shape.setAttribute('stroke-width', '2.4');
      else if (drillable) shape.setAttribute('stroke-width', String(Math.max(2, baseStrokeWidth)));
      else shape.setAttribute('stroke-width', String(baseStrokeWidth));
    }
  });

  const texts = cluster.filter(function (el) {
    return String(el.tagName || '').toLowerCase() === 'text';
  });
  texts.forEach(function (textEl) {
    const role = nodeTextRole(textEl);
    if (role === 'title') textEl.setAttribute('fill', THEME.textPrimary);
    else if (role === 'eyebrow') textEl.setAttribute('fill', THEME.textPrimary);
    else textEl.setAttribute('fill', THEME.textSecondary);
  });
}

function fallbackNodeSubtitle(node) {
  if (!node) return '';
  if (node.technology) return String(node.technology);
  if (isPersonKind(node.kind)) return personSubtitleText(node.kind);
  return '';
}

function relationshipClusterElements(anchor) {
  if (!anchor) return [];
  const tag = String(anchor.tagName || '').toLowerCase();
  if (tag === 'g') return Array.from(anchor.querySelectorAll('*'));
  return [anchor];
}

function applyRelationshipGroupTheme(group) {
  relationshipClusterElements(group).forEach(function (shape) {
    if (shape.closest('defs')) return;
    const tag = String(shape.tagName || '').toLowerCase();
    shape.removeAttribute('data-edge-visible');
    shape.removeAttribute('data-edge-stroke');
    shape.removeAttribute('data-edge-fill');
    if (tag === 'rect') {
      shape.setAttribute('fill', 'transparent');
      if (shape.hasAttribute('stroke')) shape.setAttribute('stroke', 'transparent');
      return;
    }
    if (tag === 'line' || tag === 'path' || tag === 'polyline') {
      const visibleStroke = isVisiblePaint(shape.getAttribute('stroke'));
      const visibleFill = isVisiblePaint(shape.getAttribute('fill'));
      shape.setAttribute('data-edge-visible', visibleStroke || visibleFill ? 'true' : 'false');
      if (visibleStroke) {
        shape.setAttribute('data-edge-stroke', 'true');
        shape.setAttribute('stroke', edgeColor);
        const current = parseFloat(shape.getAttribute('stroke-width') || '');
        const next = isFinite(current) ? Math.min(current, relationshipStrokeWidth) : relationshipStrokeWidth;
        shape.setAttribute('stroke-width', String(next));
      }
      if (visibleFill) {
        shape.setAttribute('data-edge-fill', 'true');
      }
    }
    if (tag === 'polygon') {
      const visibleFill = isVisiblePaint(shape.getAttribute('fill'));
      const visibleStroke = isVisiblePaint(shape.getAttribute('stroke'));
      shape.setAttribute('data-edge-visible', visibleFill || visibleStroke ? 'true' : 'false');
      if (visibleFill) {
        shape.setAttribute('data-edge-fill', 'true');
        shape.setAttribute('fill', edgeColor);
      }
      if (visibleStroke) {
        shape.setAttribute('data-edge-stroke', 'true');
        shape.setAttribute('stroke', edgeColor);
      }
      return;
    }
    if (tag === 'path' && isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('data-edge-visible', 'true');
      shape.setAttribute('data-edge-fill', 'true');
      shape.setAttribute('fill', edgeColor);
    }
    if (tag === 'text') {
      shape.setAttribute('fill', edgeDetailColor);
    }
  });
}

function isLargeScaffoldShape(el) {
  const w = parseFloat(el.getAttribute('width') || '0');
  const h = parseFloat(el.getAttribute('height') || '0');
  return isFinite(w) && isFinite(h) && (w >= 180 || h >= 110);
}

function applyScaffoldTheme(svg) {
  svg.querySelectorAll('defs polygon, defs path, defs line').forEach(function (el) {
    if (isVisiblePaint(el.getAttribute('fill'))) {
      el.setAttribute('fill', edgeColor);
    }
    if (isVisiblePaint(el.getAttribute('stroke'))) {
      el.setAttribute('stroke', edgeColor);
    }
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (textEl.closest('[data-element-id]') || textEl.closest('[data-relationship-id]') || nodeAnchorForLooseSibling(textEl)) return;
    const weight = String(textEl.getAttribute('font-weight') || '');
    const strong = weight === '700' || weight === '600';
    textEl.setAttribute('fill', strong ? THEME.textSecondary : THEME.textTertiary);
  });

  svg.querySelectorAll('rect,circle,ellipse,path,polygon,line,polyline').forEach(function (shape) {
    if (shape.hasAttribute('data-diagram-background')) {
      shape.setAttribute('fill', 'transparent');
      if (shape.hasAttribute('stroke')) shape.setAttribute('stroke', 'transparent');
      return;
    }

    if (
      shape.closest('[data-element-id]')
      || shape.closest('[data-relationship-id]')
      || shape.closest('defs')
      || nodeAnchorForLooseSibling(shape)
    ) return;

    if (String(shape.getAttribute('stroke-dasharray') || '').trim()) {
      if (isVisiblePaint(shape.getAttribute('fill'))) {
        shape.setAttribute('fill', THEME.bgSecondary);
      }
      if (isVisiblePaint(shape.getAttribute('stroke'))) {
        shape.setAttribute('stroke', THEME.line);
      }
      return;
    }

    if (isLargeScaffoldShape(shape)) {
      if (isVisiblePaint(shape.getAttribute('fill'))) {
        shape.setAttribute('fill', THEME.bgSecondary);
      }
      if (isVisiblePaint(shape.getAttribute('stroke'))) {
        shape.setAttribute('stroke', scaffoldStrokeColor);
      }
      return;
    }

    if (isVisiblePaint(shape.getAttribute('stroke'))) {
      shape.setAttribute('stroke', scaffoldStrokeColor);
    }
    if (isVisiblePaint(shape.getAttribute('fill'))) {
      shape.setAttribute('fill', THEME.bgSurfaceRaised);
    }
  });
}

function nextTextSibling(el) {
  let cur = el ? el.nextElementSibling : null;
  while (cur) {
    if (String(cur.tagName || '').toLowerCase() === 'text') return cur;
    cur = cur.nextElementSibling;
  }
  return null;
}

function findLegendGroups(svg) {
  const groups = [];
  svg.querySelectorAll('g').forEach(function (g) {
    if (g.closest('[data-element-id]') || g.closest('[data-relationship-id]')) return;
    const labels = Array.from(g.querySelectorAll('text')).map(function (t) {
      return String(t.textContent || '').trim().toLowerCase();
    });
    const hasDirectionSignals =
      labels.includes('sync')
      && labels.includes('async')
      && labels.includes('bidirectional');
    const hasRoleSignals =
      labels.includes('person')
      || labels.includes('container')
      || labels.includes('internal system')
      || labels.includes('database')
      || labels.includes('cache/queue')
      || labels.includes('external')
      || labels.includes('external system');
    const hasLegendSignals = hasDirectionSignals && hasRoleSignals;
    if (hasLegendSignals) groups.push(g);
  });
  return groups;
}

function legendColorForLabel(label) {
  const normalized = String(label || '').trim().toLowerCase();
  if (normalized === 'person') return { fill: THEME.blueMuted };
  if (normalized === 'container') return { fill: THEME.greenMuted };
  if (normalized === 'internal system') return { fill: THEME.purpleDusty };
  if (normalized === 'database') return { fill: THEME.slateNeutral };
  if (normalized === 'cache/queue') return { fill: THEME.cyanMuted };
  if (normalized === 'external' || normalized === 'external system') {
    return {
      fill: THEME.amberWarm,
      stroke: THEME.amberWarm,
    };
  }
  return null;
}

function applyLegendTheme(svg) {
  findLegendGroups(svg).forEach(function (group) {
    Array.from(group.children).forEach(function (child) {
      const tag = String(child.tagName || '').toLowerCase();

      if (tag === 'rect') {
        const width = parseFloat(child.getAttribute('width') || '0');
        const height = parseFloat(child.getAttribute('height') || '0');
        if (width > 100 || height > 20) {
          child.setAttribute('fill', THEME.bgSurfaceElevated);
          child.setAttribute('stroke', THEME.line);
          return;
        }

        const labelNode = nextTextSibling(child);
        const color = legendColorForLabel(labelNode && labelNode.textContent);
        if (color) {
          child.setAttribute('fill', color.fill);
          if (color.stroke) child.setAttribute('stroke', color.stroke);
          else child.removeAttribute('stroke');
        }
        return;
      }

      if (tag === 'line') {
        child.setAttribute('stroke', edgeColor);
        return;
      }

      if (tag === 'text') {
        child.setAttribute('fill', THEME.textSecondary);
      }
    });
  });
}

function applySvgTheme(svg, view) {
  if (!svg) return;
  remapSvgPalette(svg);

  svg.querySelectorAll('[data-element-id]').forEach(function (group) {
    const node = nodesById.get(group.getAttribute('data-element-id'));
    applyNodeGroupTheme(group, node || {});
  });

  svg.querySelectorAll('[data-relationship-id]').forEach(function (group) {
    applyRelationshipGroupTheme(group);
  });

  applyScaffoldTheme(svg);
  applyLegendTheme(svg);
}

function isDrillable(elementId) {
  return Boolean((DATA.drill_map || {})[String(elementId || '')]);
}

function elementBBox(el) {
  if (!el) return null;

  const tag = String(el.tagName || '').toLowerCase();
  if (tag === 'rect') {
    const x = parseFloat(el.getAttribute('x') || '0');
    const y = parseFloat(el.getAttribute('y') || '0');
    const w = parseFloat(el.getAttribute('width') || '0');
    const h = parseFloat(el.getAttribute('height') || '0');
    if (isFinite(x) && isFinite(y) && isFinite(w) && isFinite(h)) {
      return { x: x, y: y, width: w, height: h };
    }
  }

  try {
    const box = el.getBBox();
    if (box && isFinite(box.x) && isFinite(box.y) && isFinite(box.width) && isFinite(box.height)) {
      return box;
    }
  } catch (_err) {
    // ignore
  }
  return null;
}

function currentDiagramSvg() {
  return $('canvas').querySelector('svg');
}

function findDataBoundElement(root, attrName, expectedValue) {
  if (!root || !expectedValue) return null;
  let match = null;
  root.querySelectorAll('[' + attrName + ']').forEach(function (el) {
    if (!match && el.getAttribute(attrName) === expectedValue) match = el;
  });
  return match;
}

function pendingTargetElement(svg) {
  if (!state.pendingTarget || !svg) return null;
  if (state.pendingTarget.element_id) {
    return findDataBoundElement(svg, 'data-element-id', state.pendingTarget.element_id);
  }
  if (state.pendingTarget.relationship_id) {
    return findDataBoundElement(svg, 'data-relationship-id', state.pendingTarget.relationship_id);
  }
  return null;
}

function isCanvasCommentTarget(target) {
  return Boolean(target && !target.element_id && !target.relationship_id);
}

function canvasCommentTarget(view) {
  const resolvedView = view || currentView();
  if (!resolvedView) return null;
  return {
    view_id: resolvedView.id,
    element_id: null,
    relationship_id: null,
    target_label: activeBreadcrumbLabel(resolvedView),
  };
}

function canvasCommentAnchorRoot(eventTarget) {
  if (eventTarget && typeof eventTarget.closest === 'function') {
    const canvas = eventTarget.closest('#canvas');
    if (canvas) return canvas;
  }
  return $('canvas');
}

function commentTargetFromCanvasEvent(view, ev) {
  const interactionTarget = underlyingInteractionTarget(ev && ev.target);
  if (interactionTarget) return commentTargetFromInteractionTarget(interactionTarget);
  return canvasCommentTarget(view);
}

function commentAnchorForCanvasEvent(ev) {
  const interactionTarget = underlyingInteractionTarget(ev && ev.target);
  if (interactionTarget) return commentAnchorFromEvent(interactionTarget, ev);
  return commentAnchorFromEvent(canvasCommentAnchorRoot(ev && ev.target), ev);
}

function clearCommentTargetIndicators(svg) {
  if (!svg) return;
  svg.querySelectorAll('[data-comment-target-ring]').forEach(function (el) {
    el.remove();
  });
  svg.querySelectorAll('.is-comment-target').forEach(function (el) {
    el.classList.remove('is-comment-target');
  });
}

function clearEdgeHoverFocus(svg) {
  const targetSvg = svg || (mountedViewRuntime && mountedViewRuntime.svg) || currentDiagramSvg();
  state.edgeHoverFocusRelationshipId = null;
  if (!targetSvg) return;
  targetSvg.querySelectorAll('[data-base-marker-end]').forEach(function (shape) {
    shape.setAttribute('marker-end', shape.getAttribute('data-base-marker-end'));
    shape.removeAttribute('data-base-marker-end');
  });
  targetSvg.querySelectorAll('[data-base-marker-start]').forEach(function (shape) {
    shape.setAttribute('marker-start', shape.getAttribute('data-base-marker-start'));
    shape.removeAttribute('data-base-marker-start');
  });
  targetSvg.classList.remove('has-edge-hover-focus');
  targetSvg.querySelectorAll('.is-edge-hover-focus').forEach(function (el) {
    el.classList.remove('is-edge-hover-focus');
  });
  targetSvg.querySelectorAll('.is-edge-hover-endpoint').forEach(function (el) {
    el.classList.remove('is-edge-hover-endpoint');
  });
  targetSvg.querySelectorAll('[data-edge-focus-ring]').forEach(function (el) {
    el.remove();
  });
}

function createEdgeFocusRing(targetEl) {
  if (!targetEl) return null;
  const baseRect = String(targetEl.tagName || '').toLowerCase() === 'rect'
    ? targetEl
    : targetEl.querySelector('rect:not([data-node-header="true"])') || targetEl.querySelector('rect');
  const box = elementBBox(baseRect || targetEl);
  if (!box || !isFinite(box.x) || !isFinite(box.y) || !isFinite(box.width) || !isFinite(box.height)) return null;
  const baseRadius = baseRect ? parseFloat(baseRect.getAttribute('rx') || '10') : 10;

  const ring = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  ring.classList.add('edge-focus-ring');
  ring.setAttribute('data-edge-focus-ring', 'true');
  ring.setAttribute('fill', 'none');
  ring.setAttribute('stroke', 'var(--color-signal)');
  ring.setAttribute('stroke-width', '2.2');
  ring.setAttribute('pointer-events', 'none');
  ring.setAttribute('vector-effect', 'non-scaling-stroke');
  ring.setAttribute('x', String(box.x - EDGE_FOCUS_RING_PAD));
  ring.setAttribute('y', String(box.y - EDGE_FOCUS_RING_PAD));
  ring.setAttribute('width', String(box.width + EDGE_FOCUS_RING_PAD * 2));
  ring.setAttribute('height', String(box.height + EDGE_FOCUS_RING_PAD * 2));
  ring.setAttribute('rx', String(Math.max(10, isFinite(baseRadius) ? baseRadius : 10)));
  ring.setAttribute('ry', String(Math.max(10, isFinite(baseRadius) ? baseRadius : 10)));
  return ring;
}

function ensureEdgeHoverMarker(svg) {
  if (!svg) return null;
  let defs = svg.querySelector('defs');
  if (!defs) {
    defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    svg.insertBefore(defs, svg.firstChild || null);
  }

  let marker = defs.querySelector('#edge-hover-arrow');
  if (!marker) {
    const baseMarker = defs.querySelector('#arrow');
    marker = baseMarker ? baseMarker.cloneNode(true) : document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    if (!baseMarker) {
      const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      arrow.setAttribute('d', 'M0,0 L10,5 L0,10 z');
      marker.appendChild(arrow);
    }
    marker.querySelectorAll('path,polygon,line,polyline').forEach(function (shape) {
      const hasVisibleFill = isVisiblePaint(shape.getAttribute('fill'));
      const hasVisibleStroke = isVisiblePaint(shape.getAttribute('stroke'));
      if (!shape.hasAttribute('fill') && !shape.hasAttribute('stroke')) {
        shape.setAttribute('fill', 'var(--color-signal)');
        return;
      }
      if (hasVisibleFill) shape.setAttribute('fill', 'var(--color-signal)');
      if (hasVisibleStroke) shape.setAttribute('stroke', 'var(--color-signal)');
    });
    defs.appendChild(marker);
  }
  marker.setAttribute('id', 'edge-hover-arrow');
  marker.setAttribute('orient', 'auto-start-reverse');
  marker.setAttribute('viewBox', '0 0 10 10');
  marker.setAttribute('markerWidth', '5.25');
  marker.setAttribute('markerHeight', '5.25');
  marker.setAttribute('refX', '8.25');
  marker.setAttribute('refY', '5');

  return 'url(#edge-hover-arrow)';
}

function applyEdgeHoverFocus(relationshipEl) {
  const relationshipId = relationshipEl && relationshipEl.getAttribute('data-relationship-id');
  if (!relationshipId) {
    clearEdgeHoverFocus();
    return;
  }

  const svg = relationshipEl.ownerSVGElement || currentDiagramSvg();
  if (!svg) return;
  if (state.edgeHoverFocusRelationshipId === relationshipId && svg.classList.contains('has-edge-hover-focus')) {
    return;
  }

  clearEdgeHoverFocus(svg);
  relationshipEl.classList.add('is-edge-hover-focus');
  const hoverMarkerRef = ensureEdgeHoverMarker(svg);
  relationshipClusterElements(relationshipEl).forEach(function (shape) {
    if (!hoverMarkerRef || shape.getAttribute('data-edge-visible') !== 'true') return;
    if (shape.hasAttribute('marker-end')) {
      if (!shape.hasAttribute('data-base-marker-end')) {
        shape.setAttribute('data-base-marker-end', shape.getAttribute('marker-end'));
      }
      shape.setAttribute('marker-end', hoverMarkerRef);
    }
    if (shape.hasAttribute('marker-start')) {
      if (!shape.hasAttribute('data-base-marker-start')) {
        shape.setAttribute('data-base-marker-start', shape.getAttribute('marker-start'));
      }
      shape.setAttribute('marker-start', hoverMarkerRef);
    }
  });

  const relationship = relationshipsById.get(relationshipId);
  const endpointIds = Array.from(new Set([
    relationship && relationship.source_id,
    relationship && relationship.target_id,
  ].filter(Boolean)));

  endpointIds.forEach(function (elementId) {
    const group = findDataBoundElement(svg, 'data-element-id', elementId);
    if (!group) return;
    group.classList.add('is-edge-hover-endpoint');
    const ring = createEdgeFocusRing(group);
    if (ring && group.parentNode) group.parentNode.insertBefore(ring, group.nextSibling);
  });

  svg.classList.add('has-edge-hover-focus');
  state.edgeHoverFocusRelationshipId = relationshipId;
}

function createCommentTargetRing(targetEl) {
  if (!targetEl) return null;
  const box = elementBBox(targetEl);
  if (!box || !isFinite(box.x) || !isFinite(box.y) || !isFinite(box.width) || !isFinite(box.height)) return null;

  const baseRect = String(targetEl.tagName || '').toLowerCase() === 'rect'
    ? targetEl
    : targetEl.querySelector('rect');
  const baseRadius = baseRect ? parseFloat(baseRect.getAttribute('rx') || '10') : 10;

  const ring = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  ring.classList.add('comment-target-ring', 'is-visible');
  ring.setAttribute('data-comment-target-ring', 'true');
  ring.setAttribute('x', String(box.x - COMMENT_RING_PAD));
  ring.setAttribute('y', String(box.y - COMMENT_RING_PAD));
  ring.setAttribute('width', String(box.width + COMMENT_RING_PAD * 2));
  ring.setAttribute('height', String(box.height + COMMENT_RING_PAD * 2));
  ring.setAttribute('rx', String(Math.max(10, (isFinite(baseRadius) ? baseRadius : 10) + COMMENT_RING_PAD)));
  ring.setAttribute('ry', String(Math.max(10, (isFinite(baseRadius) ? baseRadius : 10) + COMMENT_RING_PAD)));
  return ring;
}

function applyCommentTargetIndicators(svg) {
  if (!svg) return null;
  clearCommentTargetIndicators(svg);
  if (!state.pendingTarget) return null;

  const targetEl = pendingTargetElement(svg);
  if (!targetEl) return null;

  targetEl.classList.add('is-comment-target');
  if (state.pendingTarget.element_id) {
    const ring = createCommentTargetRing(targetEl);
    if (ring && targetEl.parentNode) targetEl.parentNode.insertBefore(ring, targetEl.nextSibling);
  }
  return targetEl;
}

function applyDrillabilityAffordances(svg) {
  if (!svg) return;

  const seen = new Set();
  svg.querySelectorAll('[data-element-id]').forEach(function (el) {
    const elementId = el.getAttribute('data-element-id');
    if (!elementId || seen.has(elementId)) return;
    seen.add(elementId);

    const drillable = isDrillable(elementId);
    el.setAttribute('data-drillable', drillable ? 'true' : 'false');
    if (!drillable) return;

    // Drillable border affordance
    let shape = null;
    const tag = String(el.tagName || '').toLowerCase();
    if (tag === 'rect' || tag === 'path' || tag === 'polygon') {
      shape = el;
    } else {
      shape = el.querySelector('rect, path, polygon');
    }
    if (shape) {
      shape.setAttribute('stroke', drillStrokeColor);
      const current = parseFloat(shape.getAttribute('stroke-width') || '1.2');
      shape.setAttribute('stroke-width', String(Math.max(1.8, current)));
    }
  });
}

function syncMountedNodeSelection(group) {
  if (!group) return;
  const elementId = group.getAttribute('data-element-id');
  if (state.mode === 'explore' && elementId && elementId === state.selectedId) {
    group.setAttribute('data-selected', 'true');
  } else {
    group.removeAttribute('data-selected');
  }
  applyNodeGroupTheme(group, nodesById.get(elementId) || {});
}

function syncMountedDiagramState(options) {
  const opts = options || {};
  if (!mountedViewRuntime || mountedViewRuntime.viewKind !== 'diagram' || !mountedViewRuntime.svg) return;

  const targetIds = new Set();
  if (opts.forceAll) {
    mountedViewRuntime.nodeGroupsById.forEach(function (_group, id) {
      targetIds.add(id);
    });
  } else {
    if (opts.previousSelectedId) targetIds.add(String(opts.previousSelectedId));
    if (state.selectedId) targetIds.add(String(state.selectedId));
    mountedViewRuntime.svg.querySelectorAll('[data-element-id][data-selected="true"]').forEach(function (group) {
      const elementId = group.getAttribute('data-element-id');
      if (elementId) targetIds.add(String(elementId));
    });
  }

  targetIds.forEach(function (elementId) {
    syncMountedNodeSelection(mountedViewRuntime.nodeGroupsById.get(elementId));
  });

  if (state.pendingTarget) applyCommentTargetIndicators(mountedViewRuntime.svg);
  else clearCommentTargetIndicators(mountedViewRuntime.svg);
}

function wireSvgInteractions(svg, view) {
  dismissEdgeTooltip();

  svg.querySelectorAll('[data-element-id]').forEach(function (el) {
    el.classList.add('diagram-node');
    const node = nodesById.get(el.getAttribute('data-element-id'));
    if (node && node.synthetic) {
      el.setAttribute('data-synthetic', 'true');
    }
    if (state.mode === 'explore' && el.getAttribute('data-element-id') === state.selectedId) {
      el.setAttribute('data-selected', 'true');
    } else {
      el.removeAttribute('data-selected');
    }

    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-element-id') || 'element');
    }
  });

  svg.querySelectorAll('[data-relationship-id]').forEach(function (el) {
    el.classList.add('diagram-relationship');
    if (!el.getAttribute('data-view-id')) {
      el.setAttribute('data-view-id', view.id);
    }
    if (!el.getAttribute('data-target-label')) {
      el.setAttribute('data-target-label', el.getAttribute('data-relationship-id') || 'relationship');
    }
  });

  applyDrillabilityAffordances(svg);
  applyCommentTargetIndicators(svg);

  svg.addEventListener('click', function (ev) {
    dismissEdgeTooltip();
    const interactionTarget = underlyingInteractionTarget(ev.target);
    const element = interactionTarget && interactionTarget.hasAttribute('data-element-id') ? interactionTarget : null;

    if (isCommentMode()) {
      ev.preventDefault();
      ev.stopPropagation();
      const anchor = commentAnchorForCanvasEvent(ev);
      const target = commentTargetFromCanvasEvent(view, ev);
      if (!target) return;
      openCommentDialog(target, anchor);
      return;
    }

    if (!element) {
      setSelectedId(null, { animate: true });
      return;
    }

    const id = element.dataset.elementId;
    const nextView = (DATA.drill_map || {})[id];
    if (nextView && viewsById.has(nextView) && nextView !== state.viewId) {
      changeView(nextView, { history: 'push', direction: 'forward', animate: true });
      return;
    }

    setSelectedId(id, { animate: true });
  });

  svg.addEventListener('pointermove', function (ev) {
    const interactionTarget = underlyingInteractionTarget(ev.target);
    const relationship = interactionTarget && interactionTarget.hasAttribute('data-relationship-id') ? interactionTarget : null;
    if (!relationship || isCommentMode()) {
      dismissEdgeTooltip();
      return;
    }
    const text = relationship.getAttribute('data-tooltip-text') || relationshipLabelText(relationship);
    scheduleEdgeTooltip(text, ev.clientX, ev.clientY, relationship);
  });

  svg.addEventListener('pointerover', function (ev) {
    const interactionTarget = underlyingInteractionTarget(ev.target);
    const relationship = interactionTarget && interactionTarget.hasAttribute('data-relationship-id') ? interactionTarget : null;
    if (!relationship || isCommentMode()) {
      dismissEdgeTooltip();
      return;
    }
    const text = relationship.getAttribute('data-tooltip-text') || relationshipLabelText(relationship);
    scheduleEdgeTooltip(text, ev.clientX, ev.clientY, relationship);
  });

  svg.addEventListener('pointerleave', function () {
    dismissEdgeTooltip();
  });
}

function drawDiagramView(view) {
  const host = $('canvas');
  mountedViewRuntime = null;
  host.innerHTML = '';
  const content = createCanvasContent(host);

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      applyResponsiveSvgSizing(svg);
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      content.appendChild(svg);
      finalizeDiagramSvg(svg, view);
      mountedViewRuntime = buildMountedViewRuntime(svg, view);
      return;
    }
  }

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  const layout = layoutNodes(view.nodes || [], view.edges || [], view.type || 'generic');
  const width = layout.width;
  const height = layout.height;
  svg.setAttribute('viewBox', '0 0 ' + width + ' ' + height);
  svg.setAttribute('width', String(width));
  svg.setAttribute('height', String(height));
  applyResponsiveSvgSizing(svg);

  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
  marker.setAttribute('id', 'arrow');
  marker.setAttribute('markerWidth', '10');
  marker.setAttribute('markerHeight', '10');
  marker.setAttribute('refX', '8');
  marker.setAttribute('refY', '5');
  marker.setAttribute('orient', 'auto');
  const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  arrow.setAttribute('d', 'M0,0 L10,5 L0,10 z');
  arrow.setAttribute('fill', edgeColor);
  marker.appendChild(arrow);
  defs.appendChild(marker);
  svg.appendChild(defs);

  (layout.lanes || []).forEach(function (lane) {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(lane.x));
    rect.setAttribute('y', String(lane.y));
    rect.setAttribute('width', String(lane.w));
    rect.setAttribute('height', String(lane.h));
    rect.setAttribute('rx', '12');
    rect.setAttribute('fill', lane.fill || THEME.bgSecondary);
    rect.setAttribute('stroke', lane.stroke || scaffoldStrokeColor);
    rect.setAttribute('stroke-width', '1');
    rect.setAttribute('stroke-dasharray', lane.dash || '4 4');
    g.appendChild(rect);

    if (lane.label) {
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', String(lane.x + 10));
      text.setAttribute('y', String(lane.y + 14));
      text.setAttribute('font-size', '10');
      text.setAttribute('font-weight', '700');
      text.setAttribute('fill', lane.labelColor || THEME.textTertiary);
      text.textContent = lane.label;
      g.appendChild(text);
    }

    svg.appendChild(g);
  });

  // edges
  const edgePorts = assignEdgePorts(view.edges || [], layout.byId, layout.width, layout.height);
  const laneUsage = new Map();
  (view.edges || []).forEach(function (edge) {
    const a = layout.byId.get(edge.source_id);
    const b = layout.byId.get(edge.target_id);
    if (!a || !b) return;
    const routePoints = relationshipRoutePoints(
      a,
      b,
      edge.id || '',
      layout.byId,
      layout.width,
      layout.height,
      edgePorts.get(edge.id || '') || null,
      edge.source_id,
      edge.target_id,
      laneUsage
    );
    const pathData = roundedPolylinePathData(routePoints, 10);

    const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    edgeGroup.setAttribute('data-relationship-id', edge.id || '');
    edgeGroup.setAttribute('data-view-id', view.id);
    edgeGroup.setAttribute('data-target-label', edge.label || edge.id || 'relationship');

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('d', pathData);
    line.setAttribute('stroke', edgeColor);
    line.setAttribute(
      'stroke-width',
      state.mode === 'explore' && state.selectedId && (edge.source_id === state.selectedId || edge.target_id === state.selectedId)
        ? String(relationshipStrokeWidthSelected)
        : String(relationshipStrokeWidth)
    );
    line.setAttribute('opacity', '0.9');
    line.setAttribute('fill', 'none');
    line.setAttribute('marker-end', 'url(#arrow)');
    edgeGroup.appendChild(line);

    const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    hit.setAttribute('d', pathData);
    hit.setAttribute('stroke', 'transparent');
    hit.setAttribute('stroke-width', '14');
    hit.setAttribute('fill', 'none');
    edgeGroup.appendChild(hit);

    svg.appendChild(edgeGroup);
  });

  // nodes
  (view.nodes || []).forEach(function (node) {
    const box = layout.byId.get(node.id);
    if (!box) return;

    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('data-element-id', node.id);
    g.setAttribute('data-view-id', view.id);
    g.setAttribute('data-target-label', node.name || node.id);
    if (node.synthetic) {
      g.setAttribute('data-synthetic', 'true');
    }

    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', String(box.x));
    rect.setAttribute('y', String(box.y));
    rect.setAttribute('width', String(box.w));
    rect.setAttribute('height', String(box.h));
    rect.setAttribute('rx', '10');
    rect.setAttribute('fill', fillColorForKind(node.kind));
    const selected = state.mode === 'explore' && state.selectedId === node.id;
    rect.setAttribute('stroke', selected ? THEME.signal : colorForKind(node.kind));
    rect.setAttribute('stroke-width', selected ? '2.2' : '1.1');
    g.appendChild(rect);

    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', String(box.x + box.w / 2));
    text.setAttribute('y', String(box.y + box.h / 2 - 4));
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('font-size', '12');
    text.setAttribute('font-weight', '600');
    text.setAttribute('fill', colorForKind(node.kind));
    text.setAttribute('pointer-events', 'none');
    text.textContent = truncate(node.name || node.id, MODE === 'fast' ? 24 : 34);
    g.appendChild(text);

    const subtitle = fallbackNodeSubtitle(node);
    if (MODE === 'rich' && subtitle) {
      const sub = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      sub.setAttribute('x', String(box.x + box.w / 2));
      sub.setAttribute('y', String(box.y + box.h / 2 + 11));
      sub.setAttribute('text-anchor', 'middle');
      sub.setAttribute('dominant-baseline', 'middle');
      sub.setAttribute('font-size', '9');
      sub.setAttribute('fill', THEME.textSecondary);
      sub.setAttribute('pointer-events', 'none');
      sub.textContent = truncate(subtitle, 24);
      g.appendChild(sub);
    }

    if (isDrillable(node.id)) {
      rect.setAttribute('stroke', drillStrokeColor);
      rect.setAttribute('stroke-width', String(Math.max(1.8, parseFloat(rect.getAttribute('stroke-width') || '1.2'))));
      g.setAttribute('data-drillable', 'true');
    }

    svg.appendChild(g);
  });

  content.appendChild(svg);
  finalizeDiagramSvg(svg, view);
  mountedViewRuntime = buildMountedViewRuntime(svg, view);
}

function drawSequenceView(view) {
  const host = $('canvas');
  mountedViewRuntime = null;
  host.innerHTML = '';
  const content = createCanvasContent(host);

  const provided = normalizeSvgFragment(view.svg_fragment);
  if (provided) {
    const wrap = document.createElement('div');
    wrap.innerHTML = provided;
    const svg = wrap.querySelector('svg');
    if (svg) {
      applyResponsiveSvgSizing(svg);
      if (!svg.getAttribute('data-view-id')) {
        svg.setAttribute('data-view-id', view.id);
      }
      stripConfidenceLabelsFromSvg(svg);
      applySvgTheme(svg, view);
      wireSvgInteractions(svg, view);
      content.appendChild(svg);
      mountedViewRuntime = buildMountedViewRuntime(svg, view);
      return;
    }
  }

  const box = document.createElement('div');
  box.style.padding = '8px';

  const title = document.createElement('div');
  title.textContent = view.title || 'Sequence';
  title.style.fontWeight = '700';
  title.style.marginBottom = '10px';
  title.style.color = THEME.textPrimary;
  box.appendChild(title);

  const list = document.createElement('div');
  (view.steps || []).forEach(function (s) {
    const row = document.createElement('div');
    row.style.border = '1px solid ' + THEME.line;
    row.style.borderRadius = '8px';
    row.style.padding = '8px';
    row.style.marginBottom = '6px';
    row.style.background = THEME.bgTertiary;
    row.style.fontSize = '12px';

    const step = document.createElement('div');
    step.style.color = THEME.textSecondary;
    step.style.fontSize = '11px';
    step.textContent = '#' + s.order + '  ' + (s.source_id || '?') + ' → ' + (s.target_id || '?');
    row.appendChild(step);

    const label = document.createElement('div');
    label.style.marginTop = '3px';
    label.style.color = THEME.textPrimary;
    label.textContent = s.label || '';
    row.appendChild(label);

    list.appendChild(row);
  });
  box.appendChild(list);
  content.appendChild(box);
  mountedViewRuntime = buildMountedViewRuntime(null, view);
}

function nodeLane(node) {
  const kind = String(node.kind || '').toLowerCase();
  if (kind === 'person' || kind === 'external_system' || kind === 'external_actor' || kind === 'actor') return 'external';
  if (kind === 'database' || kind === 'datastore' || kind === 'queue' || kind === 'cache') return 'storage';
  if (kind === 'software_system' || kind === 'system' || kind === 'container' || kind === 'component') return 'internal';
  return 'internal';
}

function sortByName(list) {
  return list.slice().sort(function (a, b) {
    return (a.name || a.id || '').localeCompare(b.name || b.id || '');
  });
}

function layoutNodes(nodes, edges, viewType) {
  const sorted = sortByName(nodes || []);
  const byId = new Map();
  const lanes = [];

  const cardW = MODE === 'fast' ? 186 : 214;
  const cardH = MODE === 'fast' ? 68 : 80;
  const pad = 28;
  const baseGapX = MODE === 'fast' ? 24 : 34;
  const baseGapY = MODE === 'fast' ? 26 : 36;
  const gapBoost = Math.min(24, Math.max(0, maxIncidentCount(edges) - 3) * 3);
  const gapX = baseGapX + gapBoost;
  const gapY = baseGapY + Math.floor(gapBoost * 0.5);

  const external = [];
  const storage = [];
  const internal = [];

  sorted.forEach(function (n) {
    const lane = nodeLane(n);
    if (lane === 'external') external.push(n);
    else if (lane === 'storage') storage.push(n);
    else internal.push(n);
  });

  // system-context gets a tailored shape: system center, actors/systems on sides.
  if (viewType === 'system_context') {
    const systems = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return k === 'software_system' || k === 'system';
    });
    const others = internal.filter(function (n) {
      const k = String(n.kind || '').toLowerCase();
      return !(k === 'software_system' || k === 'system');
    });

    const people = external.filter(function (n) { return String(n.kind || '').toLowerCase() === 'person'; });
    const extSystems = external.filter(function (n) { return String(n.kind || '').toLowerCase() !== 'person'; });

    const centerNodes = systems.length ? systems : others;
    const width = Math.max(980, 340 + (Math.max(people.length, extSystems.length, 1) * (cardH + 20)));
    const height = Math.max(560, 210 + (Math.max(people.length, extSystems.length, centerNodes.length, 1) * (cardH + 18)));

    const centerX = Math.floor(width / 2 - cardW / 2);
    const centerStartY = Math.floor(height / 2 - ((centerNodes.length * (cardH + 18) - 18) / 2));
    centerNodes.forEach(function (n, i) {
      byId.set(n.id, { x: centerX, y: centerStartY + i * (cardH + 18), w: cardW + 26, h: cardH + 6 });
    });

    const leftStartY = Math.floor(height / 2 - ((people.length * (cardH + 18) - 18) / 2));
    people.forEach(function (n, i) {
      byId.set(n.id, { x: pad, y: leftStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    const rightStartY = Math.floor(height / 2 - ((extSystems.length * (cardH + 18) - 18) / 2));
    extSystems.forEach(function (n, i) {
      byId.set(n.id, { x: width - pad - cardW, y: rightStartY + i * (cardH + 18), w: cardW, h: cardH });
    });

    lanes.push(
      { x: 14, y: 14, w: 250, h: height - 28, label: 'External actors', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
      { x: centerX - 20, y: 14, w: cardW + 66, h: height - 28, label: 'System', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
      { x: width - 264, y: 14, w: 250, h: height - 28, label: 'External systems', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  if (MODE === 'fast') {
    const width = Math.max(980, pad * 2 + Math.max(external.length, internal.length, storage.length, 2) * (cardW + gapX));

    const placeRow = function (row, y, centered) {
      if (!row.length) return;
      const contentW = row.length * (cardW + gapX) - gapX;
      const startX = centered ? Math.max(pad, Math.floor((width - contentW) / 2)) : pad;
      row.forEach(function (n, i) {
        byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
      });
    };

    const extY = pad + 22;
    placeRow(external, extY, true);

    const internalRows = Math.max(1, Math.ceil(internal.length / Math.max(2, Math.ceil(Math.sqrt(internal.length || 1)))));
    const cols = Math.max(2, Math.ceil((internal.length || 1) / internalRows));
    const intStartY = extY + cardH + 62;
    internal.forEach(function (n, idx) {
      const col = idx % cols;
      const row = Math.floor(idx / cols);
      const rowWidth = Math.min(cols, internal.length - row * cols) * (cardW + gapX) - gapX;
      const startX = Math.max(pad, Math.floor((width - rowWidth) / 2));
      byId.set(n.id, { x: startX + col * (cardW + gapX), y: intStartY + row * (cardH + gapY), w: cardW, h: cardH });
    });

    const intHeight = Math.max(cardH + 24, internalRows * (cardH + gapY) - gapY + 24);
    const storageY = intStartY + intHeight + 36;
    placeRow(storage, storageY, true);

    const height = Math.max(560, storageY + cardH + 44);

    lanes.push(
      { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
      { x: 14, y: intStartY - 16, w: width - 28, h: intHeight + 30, label: 'Application', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
      { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary }
    );

    return { byId: byId, width: width, height: height, lanes: lanes };
  }

  // rich mode: layered graph for internal nodes + explicit lanes.
  const internalIds = new Set(internal.map(function (n) { return n.id; }));
  const graphEdges = (edges || []).filter(function (e) {
    return internalIds.has(e.source_id) && internalIds.has(e.target_id);
  });

  const rank = {};
  internal.forEach(function (n) { rank[n.id] = 0; });

  for (let i = 0; i < internal.length; i += 1) {
    let changed = false;
    graphEdges.forEach(function (e) {
      const next = (rank[e.source_id] || 0) + 1;
      if (next > (rank[e.target_id] || 0)) {
        rank[e.target_id] = next;
        changed = true;
      }
    });
    if (!changed) break;
  }

  const ranks = new Map();
  internal.forEach(function (n) {
    const r = rank[n.id] || 0;
    if (!ranks.has(r)) ranks.set(r, []);
    ranks.get(r).push(n);
  });

  const maxRank = Math.max(0, ...Array.from(ranks.keys()));

  const predecessors = {};
  const successors = {};
  internal.forEach(function (n) { predecessors[n.id] = []; successors[n.id] = []; });
  graphEdges.forEach(function (e) {
    predecessors[e.target_id].push(e.source_id);
    successors[e.source_id].push(e.target_id);
  });

  const orderPos = {};
  const setOrderPos = function () {
    ranks.forEach(function (arr) {
      arr.forEach(function (n, idx) { orderPos[n.id] = idx; });
    });
  };

  setOrderPos();
  for (let sweep = 0; sweep < 4; sweep += 1) {
    for (let r = 1; r <= maxRank; r += 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const pa = predecessors[a.id] || [];
        const pb = predecessors[b.id] || [];
        const ba = pa.length ? pa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pa.length : orderPos[a.id] || 0;
