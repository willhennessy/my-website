  <style>
    /*
     * DESIGN SYSTEM RULE: No box-shadows.
     *
     * This codebase uses color-based elevation, not shadow-based elevation.
     * Surfaces are distinguished by their background tokens
     * (--color-bg-app, --color-bg-sidebar, --color-bg-surface, --color-bg-surface-elevated).
     *
     * Do not add box-shadow, filter: drop-shadow, or stacked-background shadow
     * simulations to any element. If an element feels insufficiently grounded,
     * use a 1px border in --color-border-subtle or step the background up
     * the elevation ramp.
     *
     * Permitted exceptions: outline (for :focus-visible focus rings only).
     */

      --color-icon-default: #A8A8A0;
      --color-icon-muted: #7E7E7C;

      --color-element-ochre: #C99A5B;
      --color-element-teal: #5FB3AB;
      --color-element-sage: #9AB880;
      --color-element-indigo: #8093D4;
      --color-element-plum: #AE7FB2;
      --color-element-rose: #D68396;
      --color-element-slate: #8197A8;

      --color-element-ochre-fill: #443A2B;
      --color-element-teal-fill: #2D403C;
      --color-element-sage-fill: #3A4133;
      --color-element-indigo-fill: #343945;
      --color-element-plum-fill: #3E343E;
      --color-element-rose-fill: #473538;
      --color-element-slate-fill: #35393C;
      --color-bg-frame: var(--color-bg-app);
      --color-bg-panel: var(--color-bg-surface);
      --color-bg-canvas-glow: var(--color-bg-surface-elevated);
    }

    :root {
      --color-traffic-light-close: #FF5C5C;
      --color-traffic-light-minimize: #F8C800;
      --color-traffic-light-maximize: #37C65A;
      --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
      --ease-in-out: cubic-bezier(0.77, 0, 0.175, 1);
      --ease-drawer: cubic-bezier(0.32, 0.72, 0, 1);
      --duration-press: 140ms;
      --duration-fast: 180ms;
      --duration-medium: 240ms;
      --duration-slow: 320ms;
      --font-sans: "Instrument Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Consolas, monospace;
    }

    * { box-sizing: border-box; }
    html {
      background: var(--color-bg-app);
      color-scheme: light;
      height: 100%;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background-color: var(--color-bg-app);
      background: var(--color-bg-app);
      color: var(--color-text-primary);
      height: 100%;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    #app {
      height: 100vh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    @supports (height: 100dvh) {
      #app {
        height: 100dvh;
        min-height: 100dvh;
      }
    }

    .topbar {
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      min-height: 58px;
      box-sizing: border-box;
      background: var(--color-bg-app);
      border-bottom: 1px solid var(--color-border-subtle);
      position: sticky;
      top: 0;
      z-index: 42;
    }

    .topbar-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0;
      min-width: 0;
    }

    .brand-lockup {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      flex-shrink: 0;
    }

    .brand-logo {
      display: block;
      width: auto;
      height: 30px;
      max-width: min(44vw, 176px);
    }

    .brand-context {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      padding-left: 24px;
      line-height: 1.15;
    }

    .brand-context[hidden] {
      display: none;
    }

    .subtitle {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.35;
      color: var(--color-text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(72vw, 980px);
      font-variant-numeric: tabular-nums;
    }

    .theme-toggle {
      --theme-toggle-width: 80px;
      --theme-toggle-height: 40px;
      --theme-slot-size: 18px;
      --theme-slot-edge: 11px;
      --theme-thumb-size: 30px;
      --theme-thumb-inset: calc(var(--theme-slot-edge) + (var(--theme-slot-size) / 2) - (var(--theme-thumb-size) / 2));
      --theme-thumb-left: var(--theme-thumb-inset);
      --theme-accent: var(--color-brand);
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: var(--theme-toggle-width);
      min-width: var(--theme-toggle-width);
      height: var(--theme-toggle-height);
      padding: 4px;
      background-color: color-mix(in srgb, var(--color-bg-surface) 88%, var(--color-bg-sidebar));
      color: var(--color-text-primary);
      border-color: var(--color-border-default);
      border-radius: 999px;
      overflow: hidden;
      isolation: isolate;
      transition:
        border-color var(--duration-fast) var(--ease-out),
        background-color var(--duration-fast) var(--ease-out),
        transform var(--duration-fast) var(--ease-out);
    }

    .theme-toggle::before {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: radial-gradient(circle at 24% 30%, color-mix(in srgb, var(--theme-accent) 16%, transparent), transparent 44%);
      opacity: 0.95;
      transition:
        opacity var(--duration-fast) var(--ease-out),
        background-position var(--duration-medium) var(--ease-drawer);
      pointer-events: none;
    }

    .theme-toggle[data-current-theme="dark"] {
      --theme-accent: var(--color-signal);
      --theme-thumb-left: calc(100% - var(--theme-thumb-size) - var(--theme-thumb-inset));
    }

    .theme-toggle[data-current-theme="dark"]::before {
      background: radial-gradient(circle at 76% 30%, color-mix(in srgb, var(--theme-accent) 18%, transparent), transparent 44%);
    }

    .theme-toggle-track {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .theme-toggle-slot,
    .theme-toggle-thumb {
      position: absolute;
      top: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      transform: translateY(-50%);
    }

    .theme-toggle-slot {
      width: var(--theme-slot-size);
      height: var(--theme-slot-size);
      color: var(--color-text-tertiary);
      opacity: 0.84;
      z-index: 2;
      transition:
        opacity var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        transform var(--duration-medium) var(--ease-drawer);
    }

    .theme-toggle-slot svg,
    .theme-toggle-thumb svg {
      display: block;
      width: 15px;
      height: 15px;
    }

    .theme-toggle-slot-light {
      left: var(--theme-slot-edge);
    }

    .theme-toggle-slot-dark {
      right: var(--theme-slot-edge);
    }

    .theme-toggle-thumb {
      left: var(--theme-thumb-left);
      width: var(--theme-thumb-size);
      height: var(--theme-thumb-size);
      z-index: 1;
      background-color: color-mix(in srgb, var(--color-bg-surface-elevated) 92%, var(--color-bg-surface));
      border: 1px solid var(--color-border-default);
      color: var(--theme-accent);
      transition:
        left var(--duration-medium) var(--ease-drawer),
        background-color var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out),
        border-color var(--duration-fast) var(--ease-out);
    }

    .theme-toggle-thumb::before {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: inherit;
      background: radial-gradient(circle at 34% 30%, color-mix(in srgb, var(--theme-accent) 14%, white 14%), transparent 66%);
      opacity: 0.95;
      pointer-events: none;
    }

    .theme-toggle-thumb-icon {
      position: absolute;
      inset: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.82);
      pointer-events: none;
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-thumb {
      color: var(--color-signal);
      background-color: color-mix(in srgb, var(--color-bg-surface-elevated) 88%, var(--color-bg-surface-raised));
      border-color: var(--color-border-strong);
    }

    .theme-toggle[data-current-theme="light"] .theme-toggle-slot-light {
      color: var(--color-brand);
      opacity: 1;
      transform: translateY(-50%) scale(1.02);
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-slot-dark {
      color: var(--color-signal);
      opacity: 1;
      transform: translateY(-50%) scale(1.02);
    }

    .theme-toggle[data-current-theme="light"] .theme-toggle-slot-dark {
      color: var(--color-icon-muted);
      opacity: 0.74;
      transform: translateY(-50%) scale(1);
    }

    .theme-toggle[data-current-theme="dark"] .theme-toggle-slot-light {
      color: var(--color-icon-muted);
      opacity: 0.74;
      transform: translateY(-50%) scale(1);
    }

    .tabbar {
      display: none;
    }

    .tabbar::-webkit-scrollbar {
      display: none;
    }

    .breadcrumb {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-width: 0;
      padding-left: 3px;
      position: relative;
    }

    .view-overview-trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      margin-right: 0;
      background: transparent;
      border: 1px solid var(--color-border-default);
      border-radius: 6px;
      color: var(--color-text-secondary);
      cursor: pointer;
      transition:
        background var(--duration-fast) var(--ease-out),
        color var(--duration-fast) var(--ease-out);
    }

    .view-overview-anchor {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      margin-right: 4px;
      flex: 0 0 auto;
    }

    .view-overview-trigger .icon {
      width: 12px;
      height: 12px;
      display: block;
      flex: 0 0 auto;
    }

    .view-overview-trigger:hover {
      background: var(--color-hover-bg);
      color: var(--color-text-primary);
    }

    .view-overview-trigger.is-open {
      background: var(--color-pill-active-bg);
      color: var(--color-text-primary);
    }

    .view-overview-trigger:focus-visible {
      outline: 2px solid var(--color-signal);
      outline-offset: 2px;
    }

    .view-overview-popover {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 180px;
      max-width: 320px;
      max-height: 420px;
      overflow-y: auto;
      padding: 6px;
      background-color: var(--color-bg-surface-elevated);
      border: 1px solid var(--color-border-default);
      border-radius: 10px;
      z-index: 100;
    }

    [data-theme="dark"] .view-overview-popover {
      border-color: var(--color-border-strong);
    }

    .view-overview-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .view-overview-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 10px;
      padding-left: calc(7px + var(--depth, 0) * 16px);
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      border-radius: 6px;
      color: var(--color-text-secondary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .view-overview-item:hover:not(.is-current) {
      background: var(--color-hover-bg);
      color: var(--color-text-primary);
    }

    .view-overview-item.is-current {
      background: var(--color-pill-active-bg);
      color: var(--color-text-primary);
      border-left-color: var(--color-signal);
      cursor: default;
    }

    .view-overview-item:focus-visible {
      outline: 2px solid var(--color-signal);
      outline-offset: -2px;
    }

    .breadcrumb-item {
      display: inline-flex;
      align-items: center;
      border: none;
      background: transparent;
      color: var(--color-text-secondary);
      height: 24px;
      padding: 4px 6px;
      font-size: 13px;
      border-radius: 6px;
      cursor: pointer;
      line-height: 1.3;
      font-weight: 500;
      transition-property: transform, color, opacity;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      view-transition-name: none;
    }

    .breadcrumb-item:hover:not(.is-current) {
      color: var(--color-text-primary);
      background: var(--color-hover-bg);
    }

    .breadcrumb-item.is-current {
      padding: 4px 10px;
      color: var(--color-text-primary);
      background: var(--color-pill-active-bg);
      cursor: default;
    }

    .breadcrumb-separator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 24px;
      flex: 0 0 auto;
      color: var(--color-text-muted);
    }

    .breadcrumb-separator svg {
      display: block;
      width: 10px;
      height: 10px;
    }

    button {
      border: 1px solid var(--color-border-default);
      background: var(--color-bg-surface);
      color: var(--color-text-primary);
      border-radius: 12px;
      padding: 7px 10px;
      font-size: 12px;
      cursor: pointer;
      transition-property: transform, border-color, background-color, color, opacity;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
      transform: translateZ(0);
    }

    button:focus-visible:not(.view-overview-trigger),
    textarea:focus-visible {
      outline: 2px solid var(--color-focus-ring);
      outline-offset: 2px;
    }

    button:hover:not(:disabled):not(.btn-submit-comments):not(.btn-comment-submit):not(.mode-toggle-segment):not(.breadcrumb-item):not(.theme-toggle):not(.view-overview-trigger):not(.view-overview-item) {
      border-color: var(--color-border-strong);
      background: var(--color-hover-bg);
    }

    button:disabled { opacity: .5; cursor: default; }

    button:active:not(:disabled),
    .mode-toggle-segment:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background-color: var(--color-text-primary);
      color: var(--color-text-inverse);
      border-color: transparent;
      border-radius: 999px;
      padding: 8px 16px;
      font-weight: 500;
      font-size: 14px;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.96;
    }

    .btn-primary:disabled {
      opacity: 0.82;
    }

    .theme-toggle:hover:not(:disabled) {
      border-color: var(--color-border-strong);
      background-color: color-mix(in srgb, var(--color-hover-bg) 72%, var(--color-bg-surface));
    }

    .workspace {
      grid-row: 2;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(270px, 330px);
      gap: 0;
      padding: 0 12px 0 0;
      overflow: hidden;
      align-items: stretch;
    }

    .diagram-panel {
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      background: var(--color-bg-app);
    }

    .canvas-region {
      background: transparent;
      overflow: hidden;
    }

    .canvas-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 52px;
      padding: 12px 16px 8px;
      background: transparent;
      box-sizing: border-box;
    }

    .canvas-header-left {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .canvas-header-left .breadcrumb {
      flex: 1 1 auto;
      min-width: 0;
    }

    .canvas-header-right {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .canvas-surface {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      padding-block: 0;
      overflow: hidden;
      background: transparent;
    }

    .mode-toggle {
      position: relative;
      top: auto;
      left: auto;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      min-width: 244px;
      background: color-mix(in srgb, var(--color-bg-surface) 86%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-border-default) 76%, transparent);
      border-radius: 16px;
      padding: 4px;
      backdrop-filter: blur(18px) saturate(1.18);
      isolation: isolate;
      view-transition-name: mode-toggle-control;
    }

    .mode-toggle::before {
      content: "";
      position: absolute;
      inset: 4px 50% 4px 4px;
      border-radius: 12px;
      border: 1px solid color-mix(in srgb, var(--color-bg-surface-elevated) 78%, transparent);
      background: var(--color-signal);
      transform: translateX(0%);
      transform-origin: center;
      transition: transform var(--duration-slow) var(--ease-drawer);
      z-index: 0;
    }

    .mode-toggle[data-active-mode="comment"]::before {
      transform: translateX(100%);
    }

    .mode-toggle-segment {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border-radius: 12px;
      background: transparent;
      color: var(--color-text-secondary);
      border: none;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      position: relative;
      z-index: 1;
      transition-property: color, opacity, transform;
      transition-duration: var(--duration-fast);
      transition-timing-function: var(--ease-out);
    }

    .mode-toggle-segment:hover:not(.is-active) {
      color: var(--color-text-primary);
    }

    .mode-toggle-segment.is-active {
      color: var(--color-text-inverse);
    }

    .mode-toggle-segment .icon {
      width: 16px;
      height: 16px;
      flex: 0 0 auto;
      color: currentColor;
    }

    .mode-toggle-segment span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .canvas-wrap {
      position: relative;
      min-height: 0;
      flex: 1 1 auto;
      border: none;
      border-radius: 0;
      padding-block: 0;
      background: transparent;
      overflow: hidden;
      isolation: isolate;
    }

    #canvas {
      width: 100%;
      height: 100%;
      overflow: auto;
      padding: 0 18px;
      position: relative;
      scroll-behavior: smooth;
      background: var(--color-bg-app);
    }

    .view-overview-popover,
    #canvas,
    .sidebar-body,
    .dialog,
    pre {
      scrollbar-width: thin;
      scrollbar-color: color-mix(in srgb, var(--color-text-muted) 40%, transparent) transparent;
    }

    .view-overview-popover::-webkit-scrollbar,
    #canvas::-webkit-scrollbar,
    .sidebar-body::-webkit-scrollbar,
    .dialog::-webkit-scrollbar,
    pre::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    .view-overview-popover::-webkit-scrollbar-thumb,
    #canvas::-webkit-scrollbar-thumb,
    .sidebar-body::-webkit-scrollbar-thumb,
    .dialog::-webkit-scrollbar-thumb,
    pre::-webkit-scrollbar-thumb {
      border: 3px solid transparent;
      border-radius: 999px;
      background: color-mix(in srgb, var(--color-text-muted) 40%, transparent);
      background-clip: padding-box;
    }

    .view-overview-popover::-webkit-scrollbar-track,
    #canvas::-webkit-scrollbar-track,
    .sidebar-body::-webkit-scrollbar-track,
    .dialog::-webkit-scrollbar-track,
    pre::-webkit-scrollbar-track {
      background: transparent;
    }

    .canvas-content {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .canvas-content > * {
      flex: 0 0 auto;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: calc(100% - 24px);
      margin-top: 12px;
      margin-bottom: 12px;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-default);
      border-radius: 8px;
      overflow: hidden;
      backdrop-filter: none;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 44px;
      box-sizing: border-box;
      padding: 10px 16px;
      border-bottom: 1px solid var(--color-border-default);
      background: var(--color-bg-surface);
    }

    .sidebar-title {
      font-size: 13px;
      letter-spacing: 0;
      text-transform: none;
      color: var(--color-text-primary);
      font-weight: 500;
      line-height: 1.3;
      margin: 0;
    }

    .sidebar-count {
      color: var(--color-text-secondary);
      font-size: 12px;
      background: var(--color-bg-surface-elevated);
      border: 1px solid var(--color-border-default);
      padding: 4px 10px;
      border-radius: 999px;
      min-width: 30px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .sidebar-status-region {
      padding: 18px 22px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sidebar-status-region[hidden] {
      display: none;
    }

    .sidebar-body {
      min-height: 0;
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 18px 22px 20px;
    }

    .sidebar-footer {
      padding: 16px 22px 20px;
      border-top: 1px solid var(--color-border-subtle);
      background: var(--color-bg-surface);
      position: sticky;
      bottom: 0;
    }

    .sidebar[data-mode="comment"] .sidebar-header {
      height: auto;
      min-height: 44px;
      padding: 12px 16px;
    }

    .sidebar[data-mode="comment"] .sidebar-count {
      background: transparent;
      border: none;
      border-radius: 0;
      color: var(--color-text-tertiary);
      min-width: 0;
      padding: 0;
    }

    .sidebar[data-mode="comment"] .sidebar-status-region {
      gap: 0;
      padding: 0;
    }

    .sidebar[data-mode="comment"] .sidebar-body {
      padding: 18px 0 0;
    }

    .sidebar[data-mode="comment"] .sidebar-footer {
      padding: 12px 16px 16px;
    }

    .btn-submit-comments {
      width: 100%;
      background: var(--color-text-primary);
      color: var(--color-text-inverse);
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      font-weight: 500;
      font-size: 14px;

      transform: translate3d(0, 12px, 0) scale(0.96);
      filter: blur(10px);

      opacity: 0;
      visibility: hidden;
      transform: translate3d(0, 0, 0);
      transition:
        opacity 70ms linear,
        visibility 70ms linear;
    }

    .diagram-tooltip[data-visible="true"] {
      opacity: 1;
      visibility: visible;
    }

    .comment-mode-on #canvas,
    .comment-mode-on #canvas * {
      cursor: crosshair;
    }

    svg.has-edge-hover-focus [data-element-id],
    svg.has-edge-hover-focus [data-relationship-id] {
      opacity: 0.34;
      filter: saturate(0.82);
    }

    svg.has-edge-hover-focus .diagram-node.is-edge-hover-endpoint,
    svg.has-edge-hover-focus .diagram-relationship.is-edge-hover-focus {
      opacity: 1;
      filter: none;
    }

    svg.has-edge-hover-focus .diagram-relationship.is-edge-hover-focus [data-edge-visible="true"][data-edge-stroke="true"] {
      stroke: var(--color-signal) !important;
      stroke-width: 2.8 !important;
      opacity: 1;
    }

    svg.has-edge-hover-focus .diagram-relationship.is-edge-hover-focus [data-edge-visible="true"][data-edge-fill="true"] {
      fill: var(--color-signal) !important;
      opacity: 1;
    }

    svg.has-edge-hover-focus .diagram-relationship.is-edge-hover-focus [data-edge-visible="true"][data-edge-fill="true"][stroke] {
      stroke: var(--color-signal) !important;
    }

    @media (hover: hover) and (pointer: fine) {
      body:not(.comment-mode-on) .diagram-node:hover {
        transform: translateY(-2px) scale(1.01);
      }

      body:not(.comment-mode-on) .diagram-relationship:hover {
        opacity: 0.94;
      }
    }

    @keyframes target-ring-pulse {
      0%   { opacity: 0.4; }
      50%  { opacity: 1; }
      100% { opacity: 0.8; }
    }

    @keyframes status-pulse {
      0%, 100% {
        opacity: 0.62;
        transform: scale(0.86);
      }
      50% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes comment-card-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
        filter: blur(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes status-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes status-dots {
      0%,
      20% { content: ""; }
      40% { content: "."; }
      60% { content: ".."; }
      80%,
      100% { content: "..."; }
    }

    #canvas,
    #sidebar,
    #sidebarBody,
    #sidebarTitle,
    #sidebarCount,
    #sidebarFooter,
    .breadcrumb-item.is-current {
      view-transition-name: none;
    }

    html[data-ui-transition="view"] #canvas {
      view-transition-name: canvas-stage;
    }

    html[data-ui-transition="view"] .breadcrumb-item.is-current {
      view-transition-name: active-tab;
    }

    html[data-ui-transition="mode"] #sidebar {
      view-transition-name: mode-sidebar;
    }

    html[data-ui-transition="detail"] #sidebar {
      view-transition-name: detail-sidebar;
    }

    ::view-transition-group(canvas-stage),
    ::view-transition-group(active-tab),
    ::view-transition-group(mode-sidebar),
    ::view-transition-group(detail-sidebar) {
      animation-duration: var(--duration-slow);
      animation-timing-function: var(--ease-drawer);
    }

    html[data-ui-transition="mode"]::view-transition-old(root),
    html[data-ui-transition="mode"]::view-transition-new(root) {
      animation: none;
      mix-blend-mode: normal;
    }

    ::view-transition-group(mode-toggle-control),
    ::view-transition-old(mode-toggle-control),
    ::view-transition-new(mode-toggle-control) {
      animation: none;
    }

    html[data-ui-transition="view"][data-ui-direction="forward"]::view-transition-old(canvas-stage) {
      animation: canvas-slide-out-left 260ms var(--ease-out) both;
    }

    html[data-ui-transition="view"][data-ui-direction="forward"]::view-transition-new(canvas-stage) {
      animation: canvas-slide-in-right 360ms var(--ease-drawer) both;
    }

    html[data-ui-transition="view"][data-ui-direction="back"]::view-transition-old(canvas-stage) {
      animation: canvas-slide-out-right 260ms var(--ease-out) both;
    }

    html[data-ui-transition="view"][data-ui-direction="back"]::view-transition-new(canvas-stage) {
      animation: canvas-slide-in-left 360ms var(--ease-drawer) both;
    }

    html[data-ui-transition="mode"]::view-transition-old(mode-sidebar) {
      animation: surface-fade-out 180ms var(--ease-out) both;
    }

    html[data-ui-transition="mode"]::view-transition-new(mode-sidebar) {
      animation: surface-fade-in 260ms var(--ease-drawer) both;
    }

    html[data-ui-transition="detail"]::view-transition-old(detail-sidebar) {
      animation: detail-out 160ms var(--ease-out) both;
    }

    html[data-ui-transition="detail"]::view-transition-new(detail-sidebar) {
      animation: detail-in 220ms var(--ease-out) both;
    }

    @keyframes canvas-slide-in-right {
      from {
        opacity: 0;
        transform: translateX(44px) scale(0.992);
        filter: blur(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes canvas-slide-out-left {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(-34px) scale(0.992);
        filter: blur(10px);
      }
    }

    @keyframes canvas-slide-in-left {
      from {
        opacity: 0;
        transform: translateX(-44px) scale(0.992);
        filter: blur(14px);
      }
      to {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes canvas-slide-out-right {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateX(34px) scale(0.992);
        filter: blur(10px);
      }
    }

    @keyframes surface-fade-in {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.985);
        filter: blur(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes surface-fade-out {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateY(-10px) scale(0.99);
        filter: blur(8px);
      }
    }

    @keyframes detail-in {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.99);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes detail-out {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
      to {
        opacity: 0;
        transform: translateY(-8px) scale(0.992);
        filter: blur(8px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .comment-popover {
        opacity: 1;
        transform: none;
        filter: none;
      }

      .theme-toggle::before,
      .theme-toggle-thumb,
      .theme-toggle-thumb::before,
      .theme-toggle-thumb-icon,
      .theme-toggle-slot {
        transition: none !important;
      }
    }
  </style>
</head>

  return '<p class="component-kind"' + attr + '>' + esc(humanizeSlug(kind || 'unknown')) + '</p>';
}

function humanizeSlug(value) {
  return String(value || '')
    .replace(/[-_]+/g, ' ')
    .replace(/\s+/g, ' ')
    .trim()
    .replace(/\b\w/g, function (match) { return match.toUpperCase(); });
}

const missingElementNameIds = new Set();

function displayNameForElementId(id) {
  const element = nodesById.get(id);
  if (element && element.name) return element.name;
  if (id) missingElementNameIds.add(String(id));
  return humanizeSlug(id || 'unknown');
}

function relationshipDedupSignature(rel) {
  return [
    rel.source_id || '',
    rel.target_id || '',
    rel.label || '',
    rel.technology || '',
    rel.protocol || '',
    rel.interaction_type || '',
    rel.sync_async || '',
    (rel.data_objects || []).join('|'),
    (rel.tags || []).join('|'),
    rel.confidence || '',
  ].join('::');
}

function relationshipsForNode(nodeId) {
  const seen = new Set();
  return (relationshipsByNodeId.get(nodeId) || []).filter(function (rel) {
    const sig = relationshipDedupSignature(rel);
    if (seen.has(sig)) return false;
    seen.add(sig);
    return true;
  });
}

function recordPerf(name, duration, meta) {
  const entry = {
    name: name,
    duration_ms: Number(duration || 0),
    meta: meta || {},
    recorded_at: new Date().toISOString(),
  };
  PERF_STATE.last[name] = entry;
  PERF_STATE.history.push(entry);
  if (PERF_STATE.history.length > 60) PERF_STATE.history.shift();
}

function measurePerf(name, meta, fn) {
  if (typeof meta === 'function') {
    fn = meta;
    meta = {};
  }
  const perf = window.performance;
  if (!perf || typeof perf.now !== 'function') return fn();
  const start = perf.now();
  try {
    return fn();
  } finally {
    recordPerf(name, perf.now() - start, meta || {});
  }
}

function perfProfileForView(view) {
  if (!view || !view.perf || typeof view.perf !== 'object') return null;
  return view.perf;
}

function perfTierForView(view) {
  const perf = perfProfileForView(view);
  if (!perf) return 'default';
  if (
    Number(perf.edge_count || 0) >= LARGE_VIEW_EDGE_COUNT
    || Number(perf.svg_text_count || 0) >= LARGE_VIEW_SVG_TEXT_COUNT
    || Number(perf.svg_bytes || 0) >= LARGE_VIEW_SVG_BYTES
  ) {
    return 'large';
  }
  return 'default';
}

function isLargePerfView(view) {
  return perfTierForView(view) === 'large';
}

function shouldRunRuntimeRelationshipLayout(view) {
  return !isLargePerfView(view);
}

function buildMountedViewRuntime(svg, view) {
  const nodeGroupsById = new Map();
  const relationshipGroupsById = new Map();
  if (svg) {
    svg.querySelectorAll('[data-element-id]').forEach(function (group) {
      const id = group.getAttribute('data-element-id');
      if (id && !nodeGroupsById.has(id)) nodeGroupsById.set(id, group);
    });
    svg.querySelectorAll('[data-relationship-id]').forEach(function (group) {
      const id = group.getAttribute('data-relationship-id');
      if (id && !relationshipGroupsById.has(id)) relationshipGroupsById.set(id, group);
    });
  }
  return {
    viewId: view ? view.id : null,
    viewKind: view ? view.kind : null,
    perfTier: perfTierForView(view),
    svg: svg || null,
    nodeGroupsById: nodeGroupsById,
    relationshipGroupsById: relationshipGroupsById,
  };
}

function mountedViewNeedsRemount(view) {
  if (!view) return false;
  if (!mountedViewRuntime || mountedViewRuntime.viewId !== view.id) return true;

function relationshipDetailParts(rel) {

  if (rel.interaction_type && rel.interaction_type !== 'calls') details.push(humanizeSlug(rel.interaction_type));
  if (rel.sync_async && rel.sync_async !== 'human') details.push(humanizeSlug(rel.sync_async));
  if ((rel.data_objects || []).length) details.push((rel.data_objects || []).join(', '));
  return details;
}

  if (showDifferentiator && detailParts.length) {
    html.push('<p class="relationship-card-meta">' + esc(detailParts.join(' • ')) + '</p>');

function prefersReducedMotion() {
  try {
    return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  } catch (_err) {
    return false;

}

function canAnimateUi(animate, options) {
  const opts = options || {};
  if (opts.view && isLargePerfView(opts.view)) return false;
  return animate !== false && !prefersReducedMotion() && typeof document.startViewTransition === 'function';
}

function withUiTransition(mutate, options) {
  const opts = options || {};
  const animate = canAnimateUi(opts.animate, opts);
  if (!animate) {
    mutate();
    if (opts.render !== false) render();
    return Promise.resolve();
  }

  const root = document.documentElement;
  const token = String(++uiTransitionToken);
  root.setAttribute('data-ui-token', token);
  root.setAttribute('data-ui-transition', opts.kind || 'detail');
  root.setAttribute('data-ui-direction', opts.direction || 'forward');

  const transition = document.startViewTransition(function () {
    mutate();
    if (opts.render !== false) render();
  });

  return transition.finished.finally(function () {
    if (root.getAttribute('data-ui-token') !== token) return;
    root.removeAttribute('data-ui-token');
    root.removeAttribute('data-ui-transition');
    root.removeAttribute('data-ui-direction');
  });
}

function viewsList() {
  return DATA.views || [];
}

function buildViewHierarchyData() {
  const rawHierarchy = DATA.view_hierarchy || null;
  if (rawHierarchy && Array.isArray(rawHierarchy.items) && rawHierarchy.items.length) {
    const childrenByViewId = new Map();
    const parentByViewId = new Map();
    const depthByViewId = new Map();
    const knownViewIds = new Set();

    viewsList().forEach(function (view) {
      childrenByViewId.set(view.id, []);
      knownViewIds.add(view.id);
    });

    const rawParents = rawHierarchy.parent_by_view_id || {};
    Object.keys(rawParents).forEach(function (childId) {
      const parentId = rawParents[childId];
      if (!knownViewIds.has(childId) || !knownViewIds.has(parentId) || childId === parentId) return;
      parentByViewId.set(childId, parentId);
      const children = childrenByViewId.get(parentId) || [];
      if (!children.includes(childId)) children.push(childId);
      childrenByViewId.set(parentId, children);
    });

    const items = [];
    const visited = new Set();
    rawHierarchy.items.forEach(function (entry) {
      const viewId = String(entry && (entry.view_id || entry.viewId) || '');
      if (!viewId || visited.has(viewId) || !viewsById.has(viewId)) return;
      visited.add(viewId);
      const depth = Math.max(0, Number(entry && entry.depth) || 0);
      depthByViewId.set(viewId, depth);
      items.push({
        viewId: viewId,
        depth: depth,
        view: viewsById.get(viewId),
      });
    });

    const orphanIds = [];
    viewsList().forEach(function (view) {
      if (visited.has(view.id)) return;
      orphanIds.push(view.id);
      if (!depthByViewId.has(view.id)) depthByViewId.set(view.id, 0);
      items.push({
        viewId: view.id,
        depth: depthByViewId.get(view.id),
        view: view,
      });
    });

    return {
      items: items,
      childrenByViewId: childrenByViewId,
      parentByViewId: parentByViewId,
      depthByViewId: depthByViewId,
      orphanIds: orphanIds,
    };
  }

  const childrenByViewId = new Map();
  const parentByViewId = new Map();

  viewsList().forEach(function (view) {
    childrenByViewId.set(view.id, []);
  });

  viewsList().forEach(function (view) {
    const children = childrenByViewId.get(view.id) || [];
    const seenChildIds = new Set();
    (view.nodes || []).forEach(function (node) {
      const childId = (DATA.drill_map || {})[String(node && node.id || '')];
      if (!childId || !viewsById.has(childId) || childId === view.id || seenChildIds.has(childId)) return;
      seenChildIds.add(childId);
      children.push(childId);
      if (!parentByViewId.has(childId)) parentByViewId.set(childId, view.id);
    });
    childrenByViewId.set(view.id, children);
  });

  const items = [];
  const visited = new Set();

  function visit(viewId, depth) {
    if (!viewId || visited.has(viewId) || !viewsById.has(viewId)) return;
    visited.add(viewId);
    items.push({
      viewId: viewId,
      depth: depth,
      view: viewsById.get(viewId),
    });
    (childrenByViewId.get(viewId) || []).forEach(function (childId) {
      visit(childId, depth + 1);
    });
  }

  viewsList().forEach(function (view) {
    if (!parentByViewId.has(view.id)) visit(view.id, 0);
  });

  const orphanIds = [];
  viewsList().forEach(function (view) {
    if (visited.has(view.id)) return;
    orphanIds.push(view.id);
    visit(view.id, 0);
  });

  const depthByViewId = new Map();
  items.forEach(function (entry) {
    depthByViewId.set(entry.viewId, entry.depth);
  });

  return {
    items: items,
    childrenByViewId: childrenByViewId,
    parentByViewId: parentByViewId,
    depthByViewId: depthByViewId,
    orphanIds: orphanIds,
  };
}

function viewIndexForId(viewId) {

function transitionDirectionForView(nextViewId) {
  const currentIdx = viewIndexForId(state.viewId);
  const nextIdx = viewIndexForId(nextViewId);
  if (currentIdx === -1 || nextIdx === -1 || currentIdx === nextIdx) return 'forward';
  return nextIdx > currentIdx ? 'forward' : 'back';
}

function changeView(nextViewId, options) {
  const opts = options || {};
  if (!nextViewId || nextViewId === state.viewId || !viewsById.has(nextViewId)) return Promise.resolve();
  const nextView = viewsById.get(nextViewId);
  return withUiTransition(function () {
    if (opts.history === 'replace') {
      state.history = opts.nextHistory ? opts.nextHistory.slice() : [];
    } else if (opts.history === 'push') {
      state.history = state.history.concat(state.viewId);
    } else if (opts.history === 'pop') {
      state.history = state.history.slice(0, -1);
    } else if (opts.history === 'reset') {
      state.history = [];
    }
    state.viewId = nextViewId;
    state.selectedId = null;
    state.viewOverviewOpen = false;
    persistSessionViewState();
  }, {
    kind: 'view',
    direction: opts.direction || transitionDirectionForView(nextViewId),
    animate: opts.animate,
    view: nextView,
  });
}

    state.selectedId = nextSelectedId || null;

  const nextMode = normalizeViewMode(mode);
  const opts = options || {};

    persistViewMode(nextMode);

}

function statusTargetsOlderDiagram(status, latestRevisionId) {
  const submittedRevisionId = String((status && status.submitted_revision_id) || '').trim();
  const currentRevisionId = String(latestRevisionId || currentDiagramRevisionId()).trim();
  return !!(submittedRevisionId && currentRevisionId && submittedRevisionId !== currentRevisionId);
}

function maybeReloadForNewDiagram(payload) {
  const latestRevisionId = latestDiagramRevisionId(payload);
  const currentRevisionId = currentDiagramRevisionId();
  if (!latestRevisionId || !currentRevisionId || latestRevisionId === currentRevisionId || state.revisionReloadPending) {
    return false;
  }
  state.revisionReloadPending = true;
  window.location.reload();
  return true;
}

function buildCommentPayload() {

    mode: MODE,

}

function statusDetailsText() {
  const details = [];
  const status = state.activeJob || {};
  if (status.state) details.push('State: ' + status.state);
  if (status.job_id) details.push('Job id: ' + status.job_id);
  const detailText = String(status.error || status.message || '').trim();
  if (detailText) {
    details.push('', status.state === 'blocked' ? 'Status' : 'Error', detailText);
  } else {
    details.push('', 'Error', 'No additional error details were returned.');
  }
  if (state.lastSubmittedPayload) {
    details.push('', 'Submitted payload', JSON.stringify(state.lastSubmittedPayload, null, 2));
  }
  return details.join('\n');
}

function showStatusDetails() {
  const isBlocked = state.activeJob && state.activeJob.state === 'blocked';
  showOverlayContent(
    isBlocked ? 'Waiting On Direction' : 'Processing details',
    isBlocked
      ? "Claude needs clearer direction before it can update the diagram."
      : "Here's what the runtime reported for this batch.",
    statusDetailsText()
  );
}

function applyJobStatus(status, options) {
  if (!status || !status.state) return;
  const opts = options || {};
  const allowAutoRefresh = opts.allowAutoRefresh !== false;
  if ((status.state !== 'completed' || !status.has_final_result || !allowAutoRefresh) && state.autoRefreshTimer) {
    clearTimeout(state.autoRefreshTimer);
    state.autoRefreshTimer = null;
    state.autoRefreshJobId = null;
  }
  state.activeJob = status;
  updateSidebar();
  if (allowAutoRefresh) scheduleAutoRefresh(status);

  if (status.state === 'blocked' || status.state === 'failed') {
    startLatestStatusPolling();
  } else {
    stopLatestStatusPolling();
  }

  if (status.state === 'completed' || status.state === 'failed' || status.state === 'blocked') {
    stopStatusSubscriptions();
  }
}

function shouldSuppressHydratedStatus(status, latestRevisionId) {
  if (!status || !status.state) return true;
  if (statusTargetsOlderDiagram(status, latestRevisionId)) return true;
  if (status.state !== 'completed') return false;
  if (!HANDOFF.latest_job_id) return false;
  return status.job_id === HANDOFF.latest_job_id;
}

function isJobHandlingInProgress(status) {
  if (!status || !status.state) return false;
  return ['received', 'acknowledged', 'analyzing', 'fast_patch_running', 'fast_patch_ready', 'slow_patch_running'].indexOf(status.state) !== -1;
}

const CLAUDE_NOT_CONNECTED_ERROR_CODE = 'CLAUDE_NOT_CONNECTED';

function isClaudeDisconnectedStatus(status) {
  if (!status) return false;
  const code = String(status.error_code || status.code || '').toUpperCase();
  if (code === CLAUDE_NOT_CONNECTED_ERROR_CODE) return true;

  const message = [
    status.message,
    status.error,
  ].map(function (value) {
    return String(value || '');
  }).join(' ');

  return /claude channel delivery failed|channel delivery failed|could not reach the local bridge|failed to fetch|load failed|networkerror|network request failed|err_connection_refused/i.test(message);
}

function statusSummaryForActiveJob() {
  if (!state.activeJob) return null;
  const count = Math.max(
    0,
    Number(state.activeJob.submitted_comment_count || state.comments.length || 0) || 0
  );
  const tone = statusToneForState(state.activeJob.state);
  if (tone === 'success') {
    return {
      tone: tone,
      title: 'Resolved ' + commentCountLabel(count),
      subtitle: 'Updates have been applied.',
      animated: false,
    };
  }
  if (tone === 'blocked') {
    return {
      tone: tone,
      title: 'Need direction on ' + commentCountLabel(count),
      subtitle: String(state.activeJob.message || '').trim()
        || 'Claude needs a clearer architecture change before it can update the diagram.',
      animated: false,
    };
  }
  if (tone === 'failed') {
    if (isClaudeDisconnectedStatus(state.activeJob)) {
      return {
        tone: tone,
        title: 'Claude is not connected',
        subtitle: 'Restart Claude in the terminal',
        animated: false,
        allowRetry: false,
      };
    }
    return {
      tone: tone,
      title: "Couldn't process comments",
      subtitle: String(state.activeJob.message || '').trim()
        || 'Something went wrong. Open details to inspect the runtime response.',
      animated: false,
    };
  }
  return {
    tone: tone,
    title: 'Processing ' + commentCountLabel(count),
    subtitle: 'Claude is reviewing. This may take a few minutes.',
    animated: true,
  };
}

}

function startPollingJob(jobId, statusUrl) {
  stopStatusSubscriptions();
  if (!statusUrl && HANDOFF.bridge_url) {
    statusUrl = HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(jobId);
  }
  if (!statusUrl) return;
  state.pollTimer = setInterval(function () {
    fetch(statusUrl)
      .then(function (res) { return res.ok ? res.json() : null; })
      .then(function (status) {
        if (!status) return;
        applyJobStatus(status);
      })
      .catch(function () {
        // ignore transient polling failures
      });
  }, 4000);
}

function subscribeToJob(job) {
  stopStatusSubscriptions();
  stopLatestStatusPolling();
  if (!job || !job.job_id) return;

  const eventsUrl = job.events_url
    || (HANDOFF.bridge_url ? HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(job.job_id) + '/events' : '');
  const statusUrl = job.status_url
    || (HANDOFF.bridge_url ? HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(job.job_id) : '');

  if (eventsUrl && typeof EventSource !== 'undefined') {
    try {
      const source = new EventSource(eventsUrl);
      source.addEventListener('state', function (ev) {
        try {
          const payload = JSON.parse(ev.data || '{}');
          applyJobStatus(payload.status || payload);
        } catch (err) {
          // ignore malformed event payloads
        }
      });
      source.onerror = function () {
        if (!state.pollTimer) startPollingJob(job.job_id, statusUrl);
      };
      state.eventSource = source;
      return;
    } catch (err) {
      // fall through to polling
    }
  }

  startPollingJob(job.job_id, statusUrl);
}

function handleLatestStatusPayload(payload) {
  if (!payload) return;
  if (maybeReloadForNewDiagram(payload)) return;
  if (!payload.status) return;
  if (shouldSuppressHydratedStatus(payload.status, payload.diagram_revision_id)) {
    state.activeJob = null;
    updateSidebar();
    stopLatestStatusPolling();
    return;
  }
  applyJobStatus(payload.status, { allowAutoRefresh: false });
  if (payload.status.job_id && ['received', 'acknowledged', 'analyzing', 'fast_patch_running', 'fast_patch_ready', 'slow_patch_running'].indexOf(payload.status.state) !== -1) {
    subscribeToJob({
      job_id: payload.status.job_id,
      status_url: HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(payload.status.job_id),
      events_url: HANDOFF.bridge_url.replace(/\/$/, '') + '/jobs/' + encodeURIComponent(payload.status.job_id) + '/events',
    });
  }
}

function fetchLatestStatusSnapshot() {
  const url = latestStatusUrl();
  if (!url || state.latestStatusFetchInFlight) return;
  state.latestStatusFetchInFlight = true;
  fetch(url)
    .then(function (res) { return res.ok ? res.json() : null; })
    .then(function (payload) {
      handleLatestStatusPayload(payload);
    })
    .catch(function () {
      // bridge may be offline; fall back to embedded status only
    })
    .finally(function () {
      state.latestStatusFetchInFlight = false;
    });
}

function hydrateLatestStatus() {
  fetchLatestStatusSnapshot();
}

function cleanedTitle(text) {
  const t = String(text || '').trim();
  if (!t) return '';
  const parts = t.split('—').map(function (x) { return x.trim(); }).filter(Boolean);
  if (parts.length <= 1) return t;
  return parts[parts.length - 1];
}

function tabLabel(view) {
  const t = String(view.type || '').toLowerCase();
  if (t === 'system_context') return 'System Context';
  if (t === 'container') return 'Containers';
  if (t === 'component') {
    const pid = view.parent_container_id;
    const p = pid ? nodesById.get(pid) : null;
    if (p && p.name) return p.name + ' Components';
    const tail = cleanedTitle(view.title || view.id || 'Components');
    if (/components?$/i.test(tail)) return tail;
    return tail + ' Components';
  }
  return cleanedTitle(view.title || view.id || 'View');
}

function activeBreadcrumbLabel(view) {
  const current = document.querySelector('#breadcrumbNav .breadcrumb-item.is-current');
  if (current && String(current.textContent || '').trim()) {
    return String(current.textContent).trim();
  }
  const resolvedView = view || currentView();
  return resolvedView ? tabLabel(resolvedView) : 'View';
}

function viewForType(type) {
  return viewsList().find(function (view) {
    return String(view && view.type || '').toLowerCase() === type;
  }) || null;
}

function breadcrumbItemsForView(view) {
  if (!view) return [];
  const items = [];
  const seen = new Set();
  let cursor = view.id;
  while (cursor && viewsById.has(cursor) && !seen.has(cursor)) {
    seen.add(cursor);
    items.push(viewsById.get(cursor));
    cursor = VIEW_HIERARCHY.parentByViewId.get(cursor) || '';
  }
  return items.reverse();
}

function viewOverviewEntries() {
  return VIEW_HIERARCHY.items;
}

function viewDepthForId(viewId) {
  return VIEW_HIERARCHY.depthByViewId.has(viewId) ? VIEW_HIERARCHY.depthByViewId.get(viewId) : 0;
}

function overviewNavigationDirection(nextViewId) {
  const currentDepth = viewDepthForId(state.viewId);
  const nextDepth = viewDepthForId(nextViewId);
  if (nextDepth > currentDepth) return 'forward';
  if (nextDepth < currentDepth) return 'back';
  return transitionDirectionForView(nextViewId);
}

function viewOverviewTrigger() {
  return $('viewOverviewTrigger');
}

function viewOverviewPopover() {
  return $('viewOverviewPopover');
}

function viewOverviewActionableItems() {
  return Array.from(document.querySelectorAll('#breadcrumbNav .view-overview-item:not(.is-current)'));
}

function focusViewOverviewTrigger() {
  const trigger = viewOverviewTrigger();
  if (trigger) trigger.focus();
}

function focusFirstViewOverviewItem() {
  const items = viewOverviewActionableItems();
  if (items.length) {
    items[0].focus();
    return;
  }
  focusViewOverviewTrigger();
}

function focusAdjacentViewOverviewItem(direction) {
  const items = viewOverviewActionableItems();
  if (!items.length) return;
  const active = document.activeElement;
  const currentIdx = items.indexOf(active);
  if (currentIdx === -1) {
    items[direction > 0 ? 0 : items.length - 1].focus();
    return;
  }
  const nextIdx = Math.max(0, Math.min(items.length - 1, currentIdx + direction));
  items[nextIdx].focus();
}

function setViewOverviewOpen(nextOpen, options) {
  const opts = options || {};
  const canOpen = viewOverviewEntries().length > 1;
  const open = Boolean(nextOpen && canOpen);
  if (state.viewOverviewOpen === open) {
    if (open && opts.focusFirstItem) {
      focusFirstViewOverviewItem();
    } else if (!open && opts.focusTrigger) {
      focusViewOverviewTrigger();
    }
    return;
  }
  state.viewOverviewOpen = open;
  updateBreadcrumbs();
  if (open) {
    if (opts.focusFirstItem !== false) focusFirstViewOverviewItem();
  } else if (opts.focusTrigger) {
    focusViewOverviewTrigger();
  }
}

function closeViewOverview(options) {
  setViewOverviewOpen(false, options);
}

function isViewOverviewFocusTarget(target) {
  return Boolean(
    target
    && (
      target.id === 'viewOverviewTrigger'
      || (target.closest && target.closest('#viewOverviewPopover'))
    )
  );
}

    trigger.addEventListener('click', function () {

  const items = breadcrumbItemsForView(view);

    current.className = 'breadcrumb-item is-current';
    current.setAttribute('aria-current', 'page');
    current.textContent = tabLabel(item);
    nav.appendChild(current);

  if (showOverviewTrigger && state.viewOverviewOpen) {
    const popover = document.createElement('div');
    popover.id = 'viewOverviewPopover';
    popover.className = 'view-overview-popover';

      const item = document.createElement('li');
      item.setAttribute('role', 'none');

      const isCurrent = entry.viewId === state.viewId;
      button.type = 'button';
      button.className = 'view-overview-item' + (isCurrent ? ' is-current' : '');
      button.setAttribute('role', 'menuitem');
      button.setAttribute('data-view-id', entry.viewId);
      button.style.setProperty('--depth', String(entry.depth));
      button.textContent = tabLabel(entry.view);
      if (isCurrent) {
        button.setAttribute('aria-current', 'page');
        button.tabIndex = -1;
      }
      button.addEventListener('click', function () {
        if (isCurrent) {

        }
        changeView(entry.viewId, {
          history: 'reset',
          direction: overviewNavigationDirection(entry.viewId),
          animate: true,
        });

      list.appendChild(item);
    });

    popover.appendChild(list);
    const anchor = nav.querySelector('.view-overview-anchor');
    if (anchor) anchor.appendChild(popover);
  }
}

function normalizeSvgFragment(fragment) {
  let t = String(fragment || '').trim();
  if (!t) return '';

  if (t.startsWith('```')) {
    const lines = t.split('\n');
    lines.shift();
    if (lines.length && lines[lines.length - 1].trim() === '```') lines.pop();
    t = lines.join('\n').trim();
  }

  t = t.replace(/<script[\s\S]*?<\/script>/gi, '');
  // Remove person-style emoji markers from injected diagrams.
  t = t.replace(/[👤👥🧑👨👩]/gu, '');
  return t;
}

function intrinsicSvgWidth(svg) {
  if (!svg) return 0;
  const widthAttr = Number(svg.getAttribute('width') || '');
  if (Number.isFinite(widthAttr) && widthAttr > 0) return widthAttr;
  const viewBox = svg.viewBox && svg.viewBox.baseVal;
  if (viewBox && Number.isFinite(viewBox.width) && viewBox.width > 0) return viewBox.width;
  return 0;
}

function applyResponsiveSvgSizing(svg) {
  if (!svg) return;
  const authoredWidth = intrinsicSvgWidth(svg);
  svg.style.display = 'block';
  svg.style.width = authoredWidth > 0 ? String(Math.round(authoredWidth)) + 'px' : 'auto';
  svg.style.height = 'auto';
  svg.style.maxWidth = '100%';
  svg.style.marginInline = 'auto';
}

function createCanvasContent(host) {
  const content = document.createElement('div');
  content.className = 'canvas-content';
  host.appendChild(content);
  return content;
}

function isConfidenceTokenText(text) {
  const t = String(text || '').toLowerCase().trim();
  if (!t) return false;
  const cleaned = t
    .replace(/[\[\]()]/g, '')
    .replace(/\s+/g, '_')
    .replace(/-+/g, '_');
  return cleaned === 'confirmed' || cleaned === 'strong_inference' || cleaned === 'weak_inference';
}

function stripConfidenceLabelsFromSvg(svg) {
  if (!svg) return;

  svg.querySelectorAll('[data-confidence-label], .confidence-label').forEach(function (el) {
    el.remove();
  });

  svg.querySelectorAll('text').forEach(function (textEl) {
    if (isConfidenceTokenText(textEl.textContent)) {
      textEl.remove();
    }
  });
}

function isVisiblePaint(value) {
  const v = String(value || '').trim().toLowerCase();
  if (!v || v === 'none' || v === 'transparent') return false;
  if (/rgba?\([^)]*,\s*0(?:\.0+)?\s*\)$/.test(v)) return false;
  return true;
}

function replaceColorTokens(value) {
  let out = String(value || '');
  Object.keys(SVG_COLOR_REMAP).forEach(function (from) {
    const escaped = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    out = out.replace(new RegExp(escaped, 'gi'), SVG_COLOR_REMAP[from]);
  });
  return out;
}

function remapSvgPalette(svg) {
  if (!svg) return;
  svg.querySelectorAll('*').forEach(function (el) {
    ['fill', 'stroke', 'stop-color'].forEach(function (attr) {
      if (!el.hasAttribute(attr)) return;
      el.setAttribute(attr, replaceColorTokens(el.getAttribute(attr)));
    });
    if (el.hasAttribute('style')) {
      el.setAttribute('style', replaceColorTokens(el.getAttribute('style')));
    }
  });
}

function nodeTextRole(textEl) {
  const text = String(textEl.textContent || '').trim();
  if (!text) return 'body';
  const fontSize = parseFloat(textEl.getAttribute('font-size') || '0');
  const weight = String(textEl.getAttribute('font-weight') || '');
  const strong = weight === '700' || weight === '600';
  if (!strong && isFinite(fontSize) && fontSize > 0 && fontSize <= 9.5) return 'eyebrow';
  if (strong || (isFinite(fontSize) && fontSize >= 12)) return 'title';
  return 'body';
}

function nodeClusterElements(anchor) {
  if (!anchor) return [];
  const tag = String(anchor.tagName || '').toLowerCase();
  if (tag === 'g') return Array.from(anchor.children);

  const cluster = [anchor];
  let cur = anchor.nextElementSibling;
  while (cur) {
    if (cur.hasAttribute('data-element-id') || cur.hasAttribute('data-relationship-id')) break;
    const curTag = String(cur.tagName || '').toLowerCase();
    if (!['path', 'text', 'circle', 'ellipse', 'polygon'].includes(curTag)) break;
    cluster.push(cur);
    cur = cur.nextElementSibling;
  }
  return cluster;
}

function nodeAnchorForLooseSibling(el) {
  let cur = el ? el.previousElementSibling : null;
  while (cur) {
    if (cur.hasAttribute('data-element-id')) return cur;
    if (cur.hasAttribute('data-relationship-id')) return null;
    const tag = String(cur.tagName || '').toLowerCase();
    if (!['path', 'text', 'circle', 'ellipse', 'polygon'].includes(tag)) return null;
    cur = cur.previousElementSibling;
  }
  return null;
}

function isPersonKind(kind) {
  const normalized = String(kind || '').toLowerCase();
  return normalized === 'person' || normalized === 'actor' || normalized === 'external_actor';
}

function personSubtitleText(kind) {
  return 'Person';
}

function isEmojiOnlyText(text) {
  const cleaned = String(text || '').trim();
  return cleaned === '👤' || cleaned === '👥' || cleaned === '🧑' || cleaned === '👨' || cleaned === '👩';
}

function estimateTextWidth(text, fontSize) {
  return String(text || '').trim().length * Number(fontSize || 0) * 0.58;
}

function normalizeEdgeLabelText(text) {
  return String(text || '').trim().replace(/\s+/g, ' ');
}

function wrapEdgeLabelLines(text) {
  const normalized = normalizeEdgeLabelText(text);
  if (!normalized) return [];
  if (normalized.length <= 26 || normalized.indexOf(' ') === -1) return [normalized];

  const words = normalized.split(' ');
  let best = null;
  for (let idx = 1; idx < words.length; idx += 1) {
    const left = words.slice(0, idx).join(' ');
    const right = words.slice(idx).join(' ');
    const maxLen = Math.max(left.length, right.length);
    const diff = Math.abs(left.length - right.length);
    const overage = Math.max(0, maxLen - 30);
    const score = overage * 100 + maxLen * 10 + diff;
    if (!best || score < best.score) {
      best = { lines: [left, right], score: score };
    }
  }
  return best ? best.lines : [normalized];
}

function stableNumberForText(text) {
  return String(text || '').split('').reduce(function (sum, char) {
    return sum + char.charCodeAt(0);
  }, 0);
}

function maxIncidentCount(edges) {
  const counts = new Map();
  (edges || []).forEach(function (edge) {
    if (edge && edge.source_id) counts.set(edge.source_id, (counts.get(edge.source_id) || 0) + 1);
    if (edge && edge.target_id) counts.set(edge.target_id, (counts.get(edge.target_id) || 0) + 1);
  });
  return Math.max(0, ...Array.from(counts.values()));
}

function boxCenter(box) {
  return {
    x: box.x + box.w / 2,
    y: box.y + box.h / 2
  };
}

function preferredPortSide(src, dst) {
  const srcCenter = boxCenter(src);
  const dstCenter = boxCenter(dst);

  const gapEast = dst.x - (src.x + src.w);
  const gapWest = src.x - (dst.x + dst.w);
  const gapSouth = dst.y - (src.y + src.h);
  const gapNorth = src.y - (dst.y + dst.h);

  const horizontalGap = Math.max(gapEast, gapWest, 0);
  const verticalGap = Math.max(gapSouth, gapNorth, 0);

  if (horizontalGap <= ROUTING_EPSILON && verticalGap <= ROUTING_EPSILON) {
    const dx = dstCenter.x - srcCenter.x;
    const dy = dstCenter.y - srcCenter.y;
    if (Math.abs(dx) >= Math.abs(dy)) return dx >= 0 ? 'east' : 'west';
    return dy >= 0 ? 'south' : 'north';
  }

  if (horizontalGap >= verticalGap) return dstCenter.x >= srcCenter.x ? 'east' : 'west';
  return dstCenter.y >= srcCenter.y ? 'south' : 'north';
}

function sideAnchorPoint(box, side) {
  const center = boxCenter(box);
  if (side === 'north') return { x: center.x, y: box.y };
  if (side === 'south') return { x: center.x, y: box.y + box.h };
  if (side === 'west') return { x: box.x, y: center.y };
  return { x: box.x + box.w, y: center.y };
}

function slottedAnchorPoint(box, side, slotIndex, slotCount) {
  if (!slotCount || slotCount <= 1) return sideAnchorPoint(box, side);

  if (side === 'east' || side === 'west') {
    const inset = Math.min(PORT_SLOT_INSET, box.h / 3);
    const top = box.y + inset;
    const bottom = box.y + box.h - inset;
    if (bottom - top <= ROUTING_EPSILON) return sideAnchorPoint(box, side);
    const ratio = (slotIndex + 1) / (slotCount + 1);
    return { x: side === 'west' ? box.x : box.x + box.w, y: top + (bottom - top) * ratio };
  }

  const inset = Math.min(PORT_SLOT_INSET, box.w / 3);
  const left = box.x + inset;
  const right = box.x + box.w - inset;
  if (right - left <= ROUTING_EPSILON) return sideAnchorPoint(box, side);
  const ratio = (slotIndex + 1) / (slotCount + 1);
  return { x: left + (right - left) * ratio, y: side === 'north' ? box.y : box.y + box.h };
}

function offsetPointForSide(point, side, distance) {
  if (side === 'north') return { x: point.x, y: point.y - distance };
  if (side === 'south') return { x: point.x, y: point.y + distance };
  if (side === 'west') return { x: point.x - distance, y: point.y };
  return { x: point.x + distance, y: point.y };
}

function crossAxisCoordinate(box, side) {
  const center = boxCenter(box);
  return side === 'east' || side === 'west' ? center.y : center.x;
}

function nodeIncidentCounts(edges) {
  const counts = new Map();
  (edges || []).forEach(function (edge) {
    if (edge && edge.source_id) counts.set(edge.source_id, (counts.get(edge.source_id) || 0) + 1);
    if (edge && edge.target_id) counts.set(edge.target_id, (counts.get(edge.target_id) || 0) + 1);
  });
  return counts;
}

function portLoadKey(nodeId, side) {
  return String(nodeId || '') + '::' + String(side || '');
}

function portLoadCount(loads, nodeId, side) {
  if (!loads) return 0;
  return loads.get(portLoadKey(nodeId, side)) || 0;
}

function portSideSoftCap(nodeId, incidentCounts) {
  const total = incidentCounts && incidentCounts.get(nodeId) || 0;
  return Math.max(1, Math.ceil(total / 4));
}

function isBetterRouteScore(candidateScore, bestScore) {
  if (!bestScore) return true;
  for (let idx = 0; idx < candidateScore.length; idx += 1) {
    if (candidateScore[idx] < bestScore[idx] - ROUTING_EPSILON) return true;
    if (candidateScore[idx] > bestScore[idx] + ROUTING_EPSILON) return false;
  }
  return false;
}

function selectRelationshipPortSides(edge, boxesById, canvasW, canvasH, sideLoads, incidentCounts) {
  const srcBox = boxesById.get(edge.source_id);
  const dstBox = boxesById.get(edge.target_id);
  if (!srcBox || !dstBox) return { sourceSide: 'east', targetSide: 'west' };

  const preferredSrc = preferredPortSide(srcBox, dstBox);
  const preferredDst = preferredPortSide(dstBox, srcBox);
  const sourceSoftCap = portSideSoftCap(edge.source_id, incidentCounts);
  const targetSoftCap = portSideSoftCap(edge.target_id, incidentCounts);
  const sideOrder = ['north', 'south', 'east', 'west'];
  const srcCandidates = [preferredSrc].concat(sideOrder.filter(function (side) { return side !== preferredSrc; }));
  const dstCandidates = [preferredDst].concat(sideOrder.filter(function (side) { return side !== preferredDst; }));
  let best = { sourceSide: preferredSrc, targetSide: preferredDst, score: null };

  srcCandidates.forEach(function (sourceSide) {
    dstCandidates.forEach(function (targetSide) {
      const route = bestRelationshipRoutePoints(
        edge.id || '',
        edge.source_id,
        edge.target_id,
        sideAnchorPoint(srcBox, sourceSide),
        sideAnchorPoint(dstBox, targetSide),
        sourceSide,
        targetSide,
        boxesById,
        canvasW,
        canvasH
      );
      const sourceLoad = portLoadCount(sideLoads, edge.source_id, sourceSide);
      const targetLoad = portLoadCount(sideLoads, edge.target_id, targetSide);
      const score = [
        route.blockerCount,
        route.endpointPenalty || 0,
        Math.max(0, ROUTE_CLEARANCE_TARGET - route.clearance),
        Math.max(0, targetLoad + 1 - targetSoftCap),
        Math.max(0, sourceLoad + 1 - sourceSoftCap),
        targetLoad,
        sourceLoad,
        (sourceSide !== preferredSrc ? 1 : 0) + (targetSide !== preferredDst ? 1 : 0),
        route.routeLength
      ];
      if (isBetterRouteScore(score, best.score)) {
        best = { sourceSide: sourceSide, targetSide: targetSide, score: score };
      }
    });
  });

  return { sourceSide: best.sourceSide, targetSide: best.targetSide };
}

function assignEdgePorts(edges, boxesById, canvasW, canvasH) {
  const portMap = new Map();
  const groups = new Map();
  const sideLoads = new Map();
  const incidentCounts = nodeIncidentCounts(edges);

  const pushGroup = function (nodeId, side, edgeId, role, coordinate) {
    const key = nodeId + '::' + side;
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push({ edgeId: edgeId, role: role, coordinate: coordinate });
  };

  const sortedEdges = (edges || []).slice().sort(function (a, b) {
    const aMax = Math.max(incidentCounts.get(a && a.source_id) || 0, incidentCounts.get(a && a.target_id) || 0);
    const bMax = Math.max(incidentCounts.get(b && b.source_id) || 0, incidentCounts.get(b && b.target_id) || 0);
    if (bMax !== aMax) return bMax - aMax;

    const aTotal = (incidentCounts.get(a && a.source_id) || 0) + (incidentCounts.get(a && a.target_id) || 0);
    const bTotal = (incidentCounts.get(b && b.source_id) || 0) + (incidentCounts.get(b && b.target_id) || 0);
    if (bTotal !== aTotal) return bTotal - aTotal;

    return String(a && a.id || '').localeCompare(String(b && b.id || ''));
  });

  sortedEdges.forEach(function (edge) {
    const srcBox = boxesById.get(edge.source_id);
    const dstBox = boxesById.get(edge.target_id);
    if (!srcBox || !dstBox) return;

    const chosenSides = selectRelationshipPortSides(edge, boxesById, canvasW, canvasH, sideLoads, incidentCounts);
    const srcSide = chosenSides.sourceSide;
    const dstSide = chosenSides.targetSide;
    portMap.set(edge.id || '', { sourceSide: srcSide, targetSide: dstSide });
    sideLoads.set(portLoadKey(edge.source_id, srcSide), portLoadCount(sideLoads, edge.source_id, srcSide) + 1);
    sideLoads.set(portLoadKey(edge.target_id, dstSide), portLoadCount(sideLoads, edge.target_id, dstSide) + 1);

    pushGroup(edge.source_id, srcSide, edge.id || '', 'source', crossAxisCoordinate(dstBox, srcSide));
    pushGroup(edge.target_id, dstSide, edge.id || '', 'target', crossAxisCoordinate(srcBox, dstSide));
  });

  groups.forEach(function (records, key) {
    const parts = key.split('::');
    const nodeId = parts[0];
    const side = parts[1];
    const box = boxesById.get(nodeId);
    if (!box) return;

    records
      .slice()
      .sort(function (a, b) {
        if (a.coordinate !== b.coordinate) return a.coordinate - b.coordinate;
        if (a.edgeId !== b.edgeId) return String(a.edgeId).localeCompare(String(b.edgeId));
        return String(a.role).localeCompare(String(b.role));
      })
      .forEach(function (record, idx, sorted) {
        const existing = portMap.get(record.edgeId) || {};
        const laneBias = (idx - (sorted.length - 1) / 2) * ROUTE_BUNDLE_SPACING;
        existing[record.role === 'source' ? 'sourceAnchor' : 'targetAnchor'] = slottedAnchorPoint(box, side, idx, sorted.length);
        existing[record.role === 'source' ? 'sourceLaneBias' : 'targetLaneBias'] = laneBias;
        portMap.set(record.edgeId, existing);
      });
  });

  return portMap;
}

function collapseOrthogonalPoints(points) {
  const deduped = [];
  (points || []).forEach(function (point) {
    if (!point) return;
    const prev = deduped[deduped.length - 1];
    if (prev && Math.hypot(point.x - prev.x, point.y - prev.y) <= ROUTING_EPSILON) return;
    deduped.push({ x: point.x, y: point.y });
  });

  if (deduped.length <= 2) return deduped;

  const collapsed = [deduped[0]];
  for (let idx = 1; idx < deduped.length - 1; idx += 1) {
    const prev = collapsed[collapsed.length - 1];
    const cur = deduped[idx];
    const next = deduped[idx + 1];
    const sameX = Math.abs(prev.x - cur.x) <= ROUTING_EPSILON && Math.abs(cur.x - next.x) <= ROUTING_EPSILON;
    const sameY = Math.abs(prev.y - cur.y) <= ROUTING_EPSILON && Math.abs(cur.y - next.y) <= ROUTING_EPSILON;
    if (sameX || sameY) {
      const inDx = cur.x - prev.x;
      const inDy = cur.y - prev.y;
      const outDx = next.x - cur.x;
      const outDy = next.y - cur.y;
      const sameDirection = (inDx * outDx + inDy * outDy) > ROUTING_EPSILON;
      if (sameDirection) continue;
    }
    collapsed.push(cur);
  }
  collapsed.push(deduped[deduped.length - 1]);
  return collapsed;
}

function routeMode(srcSide, dstSide) {
  if ((srcSide === 'east' || srcSide === 'west') && (dstSide === 'east' || dstSide === 'west')) return 'midX';
  if ((srcSide === 'north' || srcSide === 'south') && (dstSide === 'north' || dstSide === 'south')) return 'midY';
  if (srcSide === 'east' || srcSide === 'west') return 'midY';
  return 'midX';
}

function buildRoutePoints(start, startStub, endStub, end, laneValue, mode) {
  if (mode === 'midX') {
    return [
      start,
      startStub,
      { x: laneValue, y: startStub.y },
      { x: laneValue, y: endStub.y },
      endStub,
      end
    ];
  }

  return [
    start,
    startStub,
    { x: startStub.x, y: laneValue },
    { x: endStub.x, y: laneValue },
    endStub,
    end
  ];
}

function buildDetourRoutePoints(start, startStub, endStub, end, laneValue, detourValue, mode) {
  if (mode === 'midX') {
    return [
      start,
      startStub,
      { x: laneValue, y: startStub.y },
      { x: laneValue, y: detourValue },
      { x: endStub.x, y: detourValue },
      endStub,
      end
    ];
  }

  return [
    start,
    startStub,
    { x: detourValue, y: startStub.y },
    { x: detourValue, y: endStub.y },
    endStub,
    end
  ];
}

function expandBoxForRouting(box, padding) {
  return {
    x: box.x - padding,
    y: box.y - padding,
    w: box.w + padding * 2,
    h: box.h + padding * 2
  };
}

function segmentIntersectsExpandedBox(p1, p2, box) {
  if (Math.hypot(p2.x - p1.x, p2.y - p1.y) <= ROUTING_EPSILON) return false;

  if (Math.abs(p1.x - p2.x) <= ROUTING_EPSILON) {
    const x = p1.x;
    const y1 = Math.min(p1.y, p2.y);
    const y2 = Math.max(p1.y, p2.y);
    return box.x < x && x < box.x + box.w && y2 > box.y && y1 < box.y + box.h;
  }

  if (Math.abs(p1.y - p2.y) <= ROUTING_EPSILON) {
    const y = p1.y;
    const x1 = Math.min(p1.x, p2.x);
    const x2 = Math.max(p1.x, p2.x);
    return box.y < y && y < box.y + box.h && x2 > box.x && x1 < box.x + box.w;
  }

  return false;
}

function segmentBoxDistance(p1, p2, box) {
  if (Math.abs(p1.x - p2.x) <= ROUTING_EPSILON) {
    const x = p1.x;
    const y1 = Math.min(p1.y, p2.y);
    const y2 = Math.max(p1.y, p2.y);
    const dx = box.x <= x && x <= box.x + box.w
      ? 0
      : Math.min(Math.abs(x - box.x), Math.abs(x - (box.x + box.w)));
    let dy = 0;
    if (y2 < box.y) dy = box.y - y2;
    else if (y1 > box.y + box.h) dy = y1 - (box.y + box.h);
    return Math.hypot(dx, dy);
  }

  if (Math.abs(p1.y - p2.y) <= ROUTING_EPSILON) {
    const y = p1.y;
    const x1 = Math.min(p1.x, p2.x);
    const x2 = Math.max(p1.x, p2.x);
    const dy = box.y <= y && y <= box.y + box.h
      ? 0
      : Math.min(Math.abs(y - box.y), Math.abs(y - (box.y + box.h)));
    let dx = 0;
    if (x2 < box.x) dx = box.x - x2;
    else if (x1 > box.x + box.w) dx = x1 - (box.x + box.w);
    return Math.hypot(dx, dy);
  }

  return Infinity;
}

function routeBlockerCount(points, boxesById, ignoreIds) {
  let count = 0;
  boxesById.forEach(function (box, nodeId) {
    if (ignoreIds.has(nodeId)) return;
    const expanded = expandBoxForRouting(box, ROUTE_CLEARANCE);
    for (let idx = 0; idx < points.length - 1; idx += 1) {
      if (segmentIntersectsExpandedBox(points[idx], points[idx + 1], expanded)) {
        count += 1;
        return;
      }
    }
  });
  return count;
}

function routeMinClearance(points, boxesById, ignoreIds) {
  let minDistance = Infinity;
  boxesById.forEach(function (box, nodeId) {
    if (ignoreIds.has(nodeId)) return;
    for (let idx = 0; idx < points.length - 1; idx += 1) {
      minDistance = Math.min(minDistance, segmentBoxDistance(points[idx], points[idx + 1], box));
      if (minDistance <= ROUTING_EPSILON) return;
    }
  });
  return minDistance;
}

function routeEndpointInteriorPenalty(points, srcBox, dstBox) {
  if (!points || points.length < 2) return 0;
  let penalty = 0;
  for (let idx = 0; idx < points.length - 1; idx += 1) {
    const p1 = points[idx];
    const p2 = points[idx + 1];
    if (srcBox && idx > 0 && segmentIntersectsExpandedBox(p1, p2, srcBox)) {
      penalty += 1;
    }
    if (dstBox && idx < points.length - 2 && segmentIntersectsExpandedBox(p1, p2, dstBox)) {
      penalty += 1;
    }
  }
  return penalty;
}

function laneExcursionPenalty(mode, laneValue, startStub, endStub) {
  const startAxis = mode === 'midX' ? startStub.x : startStub.y;
  const endAxis = mode === 'midX' ? endStub.x : endStub.y;
  const low = Math.min(startAxis, endAxis);
  const high = Math.max(startAxis, endAxis);
  if (laneValue < low) return low - laneValue;
  if (laneValue > high) return laneValue - high;
  return 0;
}

function detourBaselineCoordinate(mode, startStub, endStub) {
  return mode === 'midX'
    ? (startStub.y + endStub.y) / 2
    : (startStub.x + endStub.x) / 2;
}

function detourExcursionPenalty(mode, detourValue, startStub, endStub) {
  const startAxis = mode === 'midX' ? startStub.y : startStub.x;
  const endAxis = mode === 'midX' ? endStub.y : endStub.x;
  const low = Math.min(startAxis, endAxis);
  const high = Math.max(startAxis, endAxis);
  if (detourValue < low) return low - detourValue;
  if (detourValue > high) return detourValue - high;
  return 0;
}

function routeBundleKey(srcId, dstId, srcSide, dstSide, mode, portInfo) {
  const sourceLaneBias = portInfo && isFinite(portInfo.sourceLaneBias) ? portInfo.sourceLaneBias : 0;
  const targetLaneBias = portInfo && isFinite(portInfo.targetLaneBias) ? portInfo.targetLaneBias : 0;
  if (Math.abs(targetLaneBias) > ROUTING_EPSILON) return ['target', dstId, dstSide, mode].join('::');
  if (Math.abs(sourceLaneBias) > ROUTING_EPSILON) return ['source', srcId, srcSide, mode].join('::');
  return ['target', dstId, dstSide, mode].join('::');
}

function routeLaneReusePenalty(usedLanes, laneValue) {
  let penalty = 0;
  (usedLanes || []).forEach(function (usedLane) {
    penalty += Math.max(0, ROUTE_BUNDLE_SPACING - Math.abs(laneValue - usedLane));
  });
  return penalty;
}

function rememberRouteLane(laneUsage, bundleKey, laneValue) {
  if (!laneUsage || !bundleKey || !isFinite(laneValue)) return;
  if (!laneUsage.has(bundleKey)) laneUsage.set(bundleKey, []);
  laneUsage.get(bundleKey).push(laneValue);
}

function approximateRouteLength(points) {
  let length = 0;
  for (let idx = 0; idx < points.length - 1; idx += 1) {
    length += Math.hypot(points[idx + 1].x - points[idx].x, points[idx + 1].y - points[idx].y);
  }
  return length;
}

function dedupeLaneValues(values) {
  const deduped = [];
  (values || []).forEach(function (value) {
    if (deduped.some(function (existing) { return Math.abs(existing - value) <= ROUTING_EPSILON; })) return;
    deduped.push(value);
  });
  return deduped;
}

function expandLaneBundleCandidates(values, minValue, maxValue) {
  const expanded = [];
  (values || []).forEach(function (value) {
    for (let slot = -ROUTE_BUNDLE_VARIANT_COUNT; slot <= ROUTE_BUNDLE_VARIANT_COUNT; slot += 1) {
      const candidate = value + slot * ROUTE_BUNDLE_SPACING;
      if (candidate < minValue - ROUTING_EPSILON || candidate > maxValue + ROUTING_EPSILON) continue;
      expanded.push(candidate);
    }
  });
  return dedupeLaneValues(expanded);
}

function gapMidpoints(intervals) {
  const sorted = (intervals || [])
    .filter(Boolean)
    .slice()
    .sort(function (a, b) {
      if (a.start !== b.start) return a.start - b.start;
      return a.end - b.end;
    });
  if (!sorted.length) return [];

  const merged = [];
  sorted.forEach(function (interval) {
    if (!merged.length) {
      merged.push({ start: interval.start, end: interval.end });
      return;
    }
    const prev = merged[merged.length - 1];
    if (interval.start <= prev.end + ROUTING_EPSILON) {
      prev.end = Math.max(prev.end, interval.end);
      return;
    }
    merged.push({ start: interval.start, end: interval.end });
  });

  const values = [];
  for (let idx = 0; idx < merged.length - 1; idx += 1) {
    const leftEnd = merged[idx].end;
    const rightStart = merged[idx + 1].start;
    if (rightStart - leftEnd <= ROUTE_CLEARANCE * 2) continue;
    values.push((leftEnd + rightStart) / 2);
  }
  return values;
}

function detourAxisValues(mode, blockerIds, boxesById, canvasW, canvasH, startStub, endStub) {
  const values = [];
  const minAxis = 8;
  const maxAxis = mode === 'midX' ? canvasH - 8 : canvasW - 8;
  const boxes = Array.from(boxesById.values());
  const baseline = detourBaselineCoordinate(mode, startStub, endStub);
  values.push(baseline);
  if (boxes.length) {
    const minX = Math.min.apply(null, boxes.map(function (box) { return box.x; }));
