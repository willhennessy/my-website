        const bb = pb.length ? pb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / pb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
    for (let r = maxRank - 1; r >= 0; r -= 1) {
      const arr = ranks.get(r) || [];
      arr.sort(function (a, b) {
        const sa = successors[a.id] || [];
        const sb = successors[b.id] || [];
        const ba = sa.length ? sa.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sa.length : orderPos[a.id] || 0;
        const bb = sb.length ? sb.reduce(function (s, id) { return s + (orderPos[id] || 0); }, 0) / sb.length : orderPos[b.id] || 0;
        return ba - bb;
      });
      ranks.set(r, arr);
      setOrderPos();
    }
  }

  const cols = maxRank + 1;
  const internalContentW = cols * (cardW + gapX) - gapX;
  const maxPerRank = Math.max(1, ...Array.from(ranks.values()).map(function (arr) { return arr.length; }));
  const internalContentH = maxPerRank * (cardH + gapY) - gapY;

  const width = Math.max(1040, pad * 2 + Math.max(internalContentW, external.length * (cardW + gapX), storage.length * (cardW + gapX)));

  const extY = pad + 20;
  const intY = extY + cardH + 58;
  const storageY = intY + internalContentH + 56;
  const height = Math.max(620, storageY + cardH + 50);

  const placeCenteredRow = function (row, y) {
    if (!row.length) return;
    const contentW = row.length * (cardW + gapX) - gapX;
    const startX = Math.max(pad, Math.floor((width - contentW) / 2));
    row.forEach(function (n, i) {
      byId.set(n.id, { x: startX + i * (cardW + gapX), y: y, w: cardW, h: cardH });
    });
  };

  placeCenteredRow(external, extY);
  placeCenteredRow(storage, storageY);

  const startX = Math.max(pad, Math.floor((width - internalContentW) / 2));
  for (let r = 0; r <= maxRank; r += 1) {
    const arr = ranks.get(r) || [];
    const colX = startX + r * (cardW + gapX);
    const contentH = arr.length * (cardH + gapY) - gapY;
    const startY = intY + Math.max(0, Math.floor((internalContentH - contentH) / 2));
    arr.forEach(function (n, idx) {
      byId.set(n.id, { x: colX, y: startY + idx * (cardH + gapY), w: cardW, h: cardH });
    });
  }

  lanes.push(
    { x: 14, y: extY - 16, w: width - 28, h: cardH + 36, label: 'External', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
    { x: 14, y: intY - 16, w: width - 28, h: internalContentH + 34, label: 'Application graph (layered)', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary },
    { x: 14, y: storageY - 16, w: width - 28, h: cardH + 36, label: 'Data & Messaging', fill: THEME.bgSecondary, stroke: THEME.line, labelColor: THEME.textTertiary }
  );

  return { byId: byId, width: width, height: height, lanes: lanes };
}

function updateDetails() {
  measurePerf('updateDetails', {
    view_id: state.viewId || '',
    selected_id: state.selectedId || '',
  }, function () {
    const pane = $('sidebarBody');
    if (!state.selectedId) {
      pane.innerHTML = '<div class="empty-state"><p>Click a component to inspect details</p></div>';
      return;
    }
    const node = nodesById.get(state.selectedId);
    if (!node) {
      pane.innerHTML = '<div class="empty-note">Selected node missing from model</div>';
      return;
    }

    const rels = relationshipsForNode(node.id);
    const relationshipCollisionCounts = new Map();
    rels.forEach(function (rel) {
      const key = relationshipCollisionKey(rel);
      relationshipCollisionCounts.set(key, (relationshipCollisionCounts.get(key) || 0) + 1);
    });

    const html = [];
    html.push('<header class="component-header">'
      + '<h3 class="component-title">' + esc(node.name || node.id) + '</h3>'
      + kindSubtitleHtml(node.kind)
      + '</header>');

    if (node.description) {
      html.push('<section class="field-group">'
        + '<h3 class="field-label">Description</h3>'
        + '<p class="field-value">' + esc(node.description) + '</p>'
        + '</section>');
    }

    if (node.technology) {
      html.push('<section class="field-group">'
        + '<h3 class="field-label">Technology</h3>'
        + '<p class="field-value">' + esc(node.technology) + '</p>'
        + '</section>');
    }

    if (rels.length) {
      html.push('<section class="field-group"><h3 class="field-label">Relationships</h3><ul class="relationship-list">');
      rels.slice(0, 20).forEach(function (rel) {
        const showDifferentiator = (relationshipCollisionCounts.get(relationshipCollisionKey(rel)) || 0) > 1;
        html.push(relationshipCardHtml(rel, showDifferentiator));
      });
      html.push('</ul></section>');
    }

    if (node.confidence) {
      html.push('<section class="field-group">'
        + '<h3 class="field-label">Confidence</h3>'
        + '<p class="field-value">' + esc(humanizeSlug(node.confidence)) + '</p>'
        + '</section>');
    }

    if ((node.tags || []).length) {
      html.push('<section class="field-group"><h3 class="field-label">Tags</h3><div class="chip-list">');
      node.tags.forEach(function (tag) {
        html.push('<span class="chip">' + esc(tag) + '</span>');
      });
      html.push('</div></section>');
    }

    pane.innerHTML = html.join('');
  });
}

function submitButtonLabel() {
  const count = state.comments.length;
  if (state.submitInFlight) {
    return 'Sending ' + count + ' comment' + (count === 1 ? '' : 's') + '…';
  }
  return 'Submit ' + count + ' comment' + (count === 1 ? '' : 's');
}

function updateSubmitButton() {
  const submitBtn = $('submitBtn');
  if (!submitBtn) return;
  submitBtn.textContent = submitButtonLabel();
  submitBtn.disabled = state.comments.length === 0 || state.submitInFlight || isJobHandlingInProgress(state.activeJob);
}

function isCommentEditingLocked() {
  return isJobHandlingInProgress(state.activeJob);
}

function commentToneForTarget(target) {
  if (!target) return THEME.signal;
  if (target.element_id) {
    return colorForKind((nodesById.get(target.element_id) || {}).kind);
  }
  if (target.relationship_id) {
    const rel = relationshipsById.get(target.relationship_id);
    const sourceNode = rel ? nodesById.get(rel.source_id) : null;
    const targetNode = rel ? nodesById.get(rel.target_id) : null;
    return colorForKind((sourceNode || targetNode || {}).kind);
  }
  return THEME.brand;
}

function updateCommentSidebar() {
  const pane = $('sidebarBody');
  pane.innerHTML = '';

  if (!state.comments.length) {
    pane.innerHTML = '<div class="empty-state"><p>Click any element or edge to add a comment</p></div>';
    return;
  }

  const list = document.createElement('ul');
  list.className = 'comment-list';
  if (isJobHandlingInProgress(state.activeJob)) {
    list.classList.add('is-pending');
    list.setAttribute('aria-disabled', 'true');
  }

  state.comments.forEach(function (comment, idx) {
    const item = document.createElement('li');
    item.className = 'comment-card';
    item.style.setProperty('--comment-index', String(idx));

    const header = document.createElement('header');
    header.className = 'comment-card-header';

    const target = document.createElement('span');
    target.className = 'comment-card-target';
    target.textContent = commentTargetName(comment);
    target.style.setProperty('--comment-tone', commentToneForTarget(comment));

    const remove = document.createElement('button');
    remove.className = 'comment-card-delete';
    remove.type = 'button';
    remove.setAttribute('aria-label', 'Delete comment');
    remove.textContent = '×';
    remove.disabled = isJobHandlingInProgress(state.activeJob);
    if (!remove.disabled) {
      remove.addEventListener('click', function () {
        state.comments = state.comments.filter(function (entry) {
          return entry.id !== comment.id;
        });
        updateSidebar();
      });
    }

    header.appendChild(target);
    header.appendChild(remove);

    const body = document.createElement('p');
    body.className = 'comment-card-body';
    body.textContent = comment.comment;

    item.appendChild(header);
    item.appendChild(body);
    list.appendChild(item);
  });

  pane.appendChild(list);
}

function updateSidebar() {
  const sidebar = $('sidebar');
  const title = $('sidebarTitle');
  const count = $('sidebarCount');
  const footer = $('sidebarFooter');

  if (!sidebar || !title || !count || !footer) return;

  sidebar.setAttribute('data-mode', state.mode);
  sidebar.setAttribute('aria-busy', isJobHandlingInProgress(state.activeJob) ? 'true' : 'false');
  renderSidebarStatusCard();
  if (isCommentMode()) {
    title.textContent = 'Comments';
    count.hidden = false;
    count.textContent = String(state.comments.length);
    footer.hidden = false;
    updateCommentSidebar();
    updateSubmitButton();
    return;
  }

  title.textContent = 'Component details';
  count.hidden = true;
  footer.hidden = true;
  updateDetails();
}

function commentTargetName(target) {
  if (!target) return 'target';
  if (target.element_id) {
    const element = nodesById.get(target.element_id);
    return (element && element.name) || target.target_label || target.element_id;
  }
  if (target.relationship_id) {
    const rel = relationshipsById.get(target.relationship_id);
    return (rel && rel.label) || target.target_label || target.relationship_id;
  }
  return target.target_label || 'canvas';
}

function addPendingComment() {
  if (isCommentEditingLocked()) return;
  const txt = $('commentText').value.trim();
  if (!txt || !state.pendingTarget) return;
  if (state.activeJob && state.activeJob.state === 'completed') {
    state.activeJob = null;
    updateSidebar();
  }
  state.comments.push({
    id: 'comment-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8),
    view_id: state.pendingTarget.view_id,
    element_id: state.pendingTarget.element_id,
    relationship_id: state.pendingTarget.relationship_id,
    target_label: state.pendingTarget.target_label,
    comment: txt,
    created_at: Date.now(),
  });
  closeCommentDialog();
  updateSidebar();
}

function commentDialogHasDraft() {
  const textarea = $('commentText');
  return Boolean(textarea && textarea.value.trim());
}

function updateCommentComposerState() {
  const submit = $('commentAdd');
  if (submit) submit.disabled = !commentDialogHasDraft() || isCommentEditingLocked();
}

function autosizeCommentTextarea() {
  const textarea = $('commentText');
  if (!textarea) return;
  textarea.style.height = 'auto';
  const styles = window.getComputedStyle(textarea);
  const lineHeight = parseFloat(styles.lineHeight) || 0;
  const paddingTop = parseFloat(styles.paddingTop) || 0;
  const paddingBottom = parseFloat(styles.paddingBottom) || 0;
  const singleLineHeight = lineHeight + paddingTop + paddingBottom;
  const nextHeight = Math.min(textarea.scrollHeight, 160);
  textarea.style.height = nextHeight + 'px';
  const inputWrap = textarea.closest('.comment-input-wrap');
  if (inputWrap) {
    inputWrap.classList.toggle('is-single-line', textarea.scrollHeight <= singleLineHeight + 1);
  }
}

function clearDiscardPrompt() {
  if (state.discardPromptTimer) {
    clearTimeout(state.discardPromptTimer);
    state.discardPromptTimer = null;
  }
  state.discardPromptArmed = false;
  $('commentHint').classList.remove('is-visible');
  $('commentHint').textContent = '';
}

function armDiscardPrompt(message) {
  clearDiscardPrompt();
  state.discardPromptArmed = true;
  $('commentHint').textContent = message;
  $('commentHint').classList.add('is-visible');
  state.discardPromptTimer = setTimeout(function () {
    clearDiscardPrompt();
  }, 2000);
}

function attemptCloseCommentDialog(reason) {
  if (!state.pendingTarget) return true;
  if (!commentDialogHasDraft()) {
    closeCommentDialog({ animate: reason !== 'escape' });
    return true;
  }
  if (state.discardPromptArmed) {
    closeCommentDialog({ animate: reason !== 'escape' });
    return true;
  }
  armDiscardPrompt(
    reason === 'escape'
      ? 'Press Escape again to discard'
      : 'Click empty canvas again or press Escape to discard'
  );
  return false;
}

function clamp(value, min, max) {
  return Math.min(Math.max(value, min), max);
}

function pendingTargetViewportRect() {
  const svg = currentDiagramSvg();
  const targetEl = pendingTargetElement(svg);
  const rectSource = targetEl || (isCanvasCommentTarget(state.pendingTarget) ? $('canvas') : null);
  if (!rectSource) return null;
  const rect = rectSource.getBoundingClientRect();
  if (!rect || !isFinite(rect.left) || !isFinite(rect.top) || !isFinite(rect.width) || !isFinite(rect.height)) return null;
  return rect;
}

function commentAnchorFromEvent(targetEl, ev) {
  if (!targetEl || !ev) return null;
  const rect = targetEl.getBoundingClientRect();
  if (!rect || !isFinite(rect.left) || !isFinite(rect.top)) return null;
  const width = Math.max(rect.width, 1);
  const height = Math.max(rect.height, 1);
  return {
    xRatio: clamp((ev.clientX - rect.left) / width, 0, 1),
    yRatio: clamp((ev.clientY - rect.top) / height, 0, 1),
  };
}

function pendingTargetAnchorPoint(targetRect) {
  if (!targetRect) return null;
  const anchor = state.pendingTargetAnchor;
  const xRatio = anchor && isFinite(anchor.xRatio) ? anchor.xRatio : 0.5;
  const yRatio = anchor && isFinite(anchor.yRatio) ? anchor.yRatio : 0.5;
  return {
    x: targetRect.left + targetRect.width * xRatio,
    y: targetRect.top + targetRect.height * yRatio,
  };
}

function commentPlacementRect(targetRect, anchorPoint) {
  if (!targetRect) return null;
  if (state.pendingTarget && anchorPoint && (state.pendingTarget.relationship_id || isCanvasCommentTarget(state.pendingTarget))) {
    return {
      left: anchorPoint.x,
      right: anchorPoint.x,
      top: anchorPoint.y,
      bottom: anchorPoint.y,
      width: 0,
      height: 0,
    };
  }
  return targetRect;
}

function resolveCommentPointerPlacement(anchorPoint, popoverRect, fallbackPlacement) {
  if (!anchorPoint || !popoverRect) return fallbackPlacement;

  const popoverRight = popoverRect.left + popoverRect.width;
  const popoverBottom = popoverRect.top + popoverRect.height;
  const horizontalGap = anchorPoint.x < popoverRect.left
    ? popoverRect.left - anchorPoint.x
    : anchorPoint.x > popoverRight
    ? anchorPoint.x - popoverRight
    : 0;
  const verticalGap = anchorPoint.y < popoverRect.top
    ? popoverRect.top - anchorPoint.y
    : anchorPoint.y > popoverBottom
    ? anchorPoint.y - popoverBottom
    : 0;

  if (!horizontalGap && !verticalGap) return fallbackPlacement;
  if (horizontalGap >= verticalGap) {
    return anchorPoint.x < popoverRect.left ? 'right' : 'left';
  }
  return anchorPoint.y < popoverRect.top ? 'bottom' : 'top';
}

function commentPopoverBounds() {
  const wrap = document.querySelector('.canvas-wrap');
  const rect = wrap ? wrap.getBoundingClientRect() : null;
  const viewport = {
    left: COMMENT_POPOVER_PADDING,
    top: COMMENT_POPOVER_PADDING,
    right: window.innerWidth - COMMENT_POPOVER_PADDING,
    bottom: window.innerHeight - COMMENT_POPOVER_PADDING,
  };
  if (!rect) return viewport;
  return {
    left: Math.max(viewport.left, rect.left + COMMENT_POPOVER_PADDING),
    top: Math.max(viewport.top, rect.top + COMMENT_POPOVER_PADDING),
    right: Math.min(viewport.right, rect.right - COMMENT_POPOVER_PADDING),
    bottom: Math.min(viewport.bottom, rect.bottom - COMMENT_POPOVER_PADDING),
  };
}

function positionCommentDialog() {
  const overlay = $('commentDialogOverlay');
  const dialog = $('commentDialog');
  if (!overlay || !dialog || !overlay.classList.contains('show')) return;

  const targetRect = pendingTargetViewportRect();
  if (!targetRect) {
    closeCommentDialog();
    return;
  }
  const anchorPoint = pendingTargetAnchorPoint(targetRect);
  const placementRect = commentPlacementRect(targetRect, anchorPoint) || targetRect;

  dialog.style.left = COMMENT_POPOVER_PADDING + 'px';
  dialog.style.top = COMMENT_POPOVER_PADDING + 'px';

  const rect = dialog.getBoundingClientRect();
  const bounds = commentPopoverBounds();
  const maxLeft = Math.max(bounds.left, bounds.right - rect.width);
  const maxTop = Math.max(bounds.top, bounds.bottom - rect.height);
  const targetCenterX = placementRect.left + placementRect.width / 2;
  const targetCenterY = placementRect.top + placementRect.height / 2;

  const rightFits = placementRect.right + COMMENT_POPOVER_GAP + rect.width <= bounds.right;
  const leftFits = placementRect.left - COMMENT_POPOVER_GAP - rect.width >= bounds.left;
  const bottomFits = placementRect.bottom + COMMENT_POPOVER_GAP + rect.height <= bounds.bottom;
  const topFits = placementRect.top - COMMENT_POPOVER_GAP - rect.height >= bounds.top;

  let placement = 'right';
  if (rightFits) placement = 'right';
  else if (leftFits) placement = 'left';
  else if (bottomFits) placement = 'bottom';
  else if (topFits) placement = 'top';
  else {
    const available = {
      right: bounds.right - placementRect.right,
      left: placementRect.left - bounds.left,
      bottom: bounds.bottom - placementRect.bottom,
      top: placementRect.top - bounds.top,
    };
    placement = Object.keys(available).sort(function (a, b) {
      return available[b] - available[a];
    })[0] || 'right';
  }

  let left = COMMENT_POPOVER_PADDING;
  let top = COMMENT_POPOVER_PADDING;

  if (placement === 'right') {
    left = placementRect.right + COMMENT_POPOVER_GAP;
    top = targetCenterY - rect.height / 2;
  } else if (placement === 'left') {
    left = placementRect.left - COMMENT_POPOVER_GAP - rect.width;
    top = targetCenterY - rect.height / 2;
  } else if (placement === 'bottom') {
    left = targetCenterX - rect.width / 2;
    top = placementRect.bottom + COMMENT_POPOVER_GAP;
  } else {
    left = targetCenterX - rect.width / 2;
    top = placementRect.top - COMMENT_POPOVER_GAP - rect.height;
  }

  left = clamp(left, bounds.left, maxLeft);
  top = clamp(top, bounds.top, maxTop);

  const effectivePlacement = resolveCommentPointerPlacement(anchorPoint, {
    left: left,
    top: top,
    width: rect.width,
    height: rect.height,
  }, placement);

  dialog.style.left = left + 'px';
  dialog.style.top = top + 'px';
  dialog.setAttribute('data-placement', effectivePlacement);
  const pointerX = clamp((anchorPoint ? anchorPoint.x : targetCenterX) - left, COMMENT_POINTER_PAD, rect.width - COMMENT_POINTER_PAD);
  const pointerY = clamp((anchorPoint ? anchorPoint.y : targetCenterY) - top, COMMENT_POINTER_PAD, rect.height - COMMENT_POINTER_PAD);
  dialog.style.setProperty('--comment-pointer-x', pointerX + 'px');
  dialog.style.setProperty('--comment-pointer-y', pointerY + 'px');
  dialog.style.setProperty('--comment-origin-x', pointerX + 'px');
  dialog.style.setProperty('--comment-origin-y', pointerY + 'px');
  state.pendingPlacement = effectivePlacement;
}

function finishCloseCommentDialog() {
  if (state.commentCloseTimer) {
    clearTimeout(state.commentCloseTimer);
    state.commentCloseTimer = null;
  }
  $('commentDialogOverlay').className = 'overlay overlay-popover';
  $('commentDialog').style.left = '';
  $('commentDialog').style.top = '';
  $('commentDialog').style.removeProperty('--comment-pointer-x');
  $('commentDialog').style.removeProperty('--comment-pointer-y');
  $('commentDialog').style.removeProperty('--comment-origin-x');
  $('commentDialog').style.removeProperty('--comment-origin-y');
  $('commentDialog').setAttribute('data-placement', 'right');
  $('commentDialog').setAttribute('data-animate-state', 'closed');
  clearDiscardPrompt();
  state.pendingTarget = null;
  state.pendingTargetAnchor = null;
  state.pendingPlacement = 'right';
  applyCommentTargetIndicators(currentDiagramSvg());
}

function openCommentDialog(target, anchor) {
  if (isCommentEditingLocked()) return;
  const dialog = $('commentDialog');
  if (state.commentCloseTimer) {
    clearTimeout(state.commentCloseTimer);
    state.commentCloseTimer = null;
  }
  state.pendingTarget = target;
  state.pendingTargetAnchor = anchor || null;
  state.pendingPlacement = 'right';
  $('commentTitle').textContent = commentTargetName(target);
  $('commentText').value = '';
  $('commentText').style.height = 'auto';
  clearDiscardPrompt();
  updateCommentComposerState();
  applyCommentTargetIndicators(currentDiagramSvg());
  $('commentDialogOverlay').className = 'overlay overlay-popover show';
  dialog.setAttribute('data-animate-state', 'closed');
  window.requestAnimationFrame(function () {
    positionCommentDialog();
    dialog.setAttribute('data-animate-state', 'open');
    autosizeCommentTextarea();
    $('commentText').focus();
  });
}

function closeCommentDialog(options) {
  const opts = options || {};
  const overlay = $('commentDialogOverlay');
  const dialog = $('commentDialog');
  if (!overlay || !dialog || !overlay.classList.contains('show')) {
    finishCloseCommentDialog();
    return;
  }

  if (opts.instant || opts.animate === false || prefersReducedMotion()) {
    finishCloseCommentDialog();
    return;
  }

  dialog.setAttribute('data-animate-state', 'closing');
  state.commentCloseTimer = window.setTimeout(finishCloseCommentDialog, 170);
}

function elementUnderPopoverClick(ev) {
  const overlay = $('commentDialogOverlay');
  if (!overlay) return null;
  const previousPointerEvents = overlay.style.pointerEvents;
  overlay.style.pointerEvents = 'none';
  const underlying = document.elementFromPoint(ev.clientX, ev.clientY);
  overlay.style.pointerEvents = previousPointerEvents;
  return underlying;
}

function underlyingInteractionTarget(el) {
  return el ? el.closest('[data-element-id], [data-relationship-id]') : null;
}

function commentTargetFromInteractionTarget(targetEl) {
  if (!targetEl) return null;
  const viewId = targetEl.getAttribute('data-view-id') || state.viewId;
  if (targetEl.getAttribute('data-synthetic') === 'true') {
    return canvasCommentTarget(viewsById.get(viewId) || currentView());
  }
  if (targetEl.hasAttribute('data-element-id')) {
    return {
      view_id: viewId,
      element_id: targetEl.getAttribute('data-element-id'),
      relationship_id: null,
      target_label: targetEl.getAttribute('data-target-label') || targetEl.getAttribute('data-element-id'),
    };
  }
  if (targetEl.hasAttribute('data-relationship-id')) {
    return {
      view_id: viewId,
      element_id: null,
      relationship_id: targetEl.getAttribute('data-relationship-id') || null,
      target_label: targetEl.getAttribute('data-target-label') || targetEl.getAttribute('data-relationship-id') || 'relationship',
    };
  }
  return null;
}

function isPendingTargetMatch(el) {
  const target = underlyingInteractionTarget(el);
  if (!target || !state.pendingTarget) return false;
  if (state.pendingTarget.element_id) {
    return target.getAttribute('data-element-id') === state.pendingTarget.element_id;
  }
  if (state.pendingTarget.relationship_id) {
    return target.getAttribute('data-relationship-id') === state.pendingTarget.relationship_id;
  }
  return false;
}

async function submitPayload() {
  const payload = buildCommentPayload();
  if (!payload.comments.length) return;
  state.lastSubmittedPayload = payload;

  if (!HANDOFF.bridge_url || !HANDOFF.output_root) {
    applyJobStatus({
      state: 'failed',
      message: 'The local bridge is not configured in this diagram.',
      error: 'The local bridge is not configured in this diagram.',
      submitted_comment_count: payload.comments.length,
      needs_refresh: false,
    });
    return;
  }

  state.submitInFlight = true;
  updateSubmitButton();
  applyJobStatus({
    state: 'received',
    message: 'Comments sent. The agent is reviewing them now.',
    submitted_comment_count: payload.comments.length,
    needs_refresh: false,
  });

  try {
    const response = await fetch(HANDOFF.bridge_url.replace(/\/$/, '') + '/feedback-batches', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!response.ok) {
      const errPayload = await response.json().catch(function () { return {}; });
      if (response.status === 409 && /already in progress/i.test(String(errPayload.error || ''))) {
        applyJobStatus({
          state: 'received',
          message: 'Another comment update is already in progress. Refreshing status…',
          submitted_comment_count: payload.comments.length,
          needs_refresh: false,
        });
        hydrateLatestStatus();
        return;
      }
      throw new Error(errPayload.error || ('Bridge returned ' + response.status));
    }

    const accepted = await response.json();
    $('payloadOverlay').className = 'overlay';
    applyJobStatus({
      job_id: accepted.job_id,
      state: accepted.state,
      message: accepted.message,
      status_url: accepted.status_url,
      events_url: accepted.events_url,
      submitted_comment_count: payload.comments.length,
      needs_refresh: false,
    });
    subscribeToJob({
      job_id: accepted.job_id,
      status_url: accepted.status_url,
      events_url: accepted.events_url,
    });
  } catch (err) {
    const errorMessage = String(err && err.message ? err.message : 'Could not reach the local bridge.');
    const claudeDisconnected = isClaudeDisconnectedStatus({ error: errorMessage });
    applyJobStatus({
      state: 'failed',
      message: claudeDisconnected ? 'Restart Claude in the terminal' : 'The update hit a problem.',
      error: errorMessage,
      error_code: claudeDisconnected ? CLAUDE_NOT_CONNECTED_ERROR_CODE : '',
      submitted_comment_count: payload.comments.length,
      needs_refresh: false,
    });
  } finally {
    state.submitInFlight = false;
    render();
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\"/g, '&quot;');
}

function truncate(s, n) {
  s = String(s || '');
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

function mountCurrentView(view) {
  if (!view) return;
  measurePerf('mountCurrentView', {
    view_id: view.id,
    perf_tier: perfTierForView(view),
  }, function () {
    if (view.kind === 'sequence') drawSequenceView(view);
    else drawDiagramView(view);
  });
}

function syncCurrentViewState(options) {
  const view = currentView();
  if (!view) return;

  if (view.kind === 'diagram') {
    syncMountedDiagramState(options);
  } else if (mountedViewRuntime && mountedViewRuntime.svg) {
    if (state.pendingTarget) applyCommentTargetIndicators(mountedViewRuntime.svg);
    else clearCommentTargetIndicators(mountedViewRuntime.svg);
  }

  if (state.pendingTarget) {
    window.requestAnimationFrame(function () {
      applyCommentTargetIndicators(currentDiagramSvg());
      positionCommentDialog();
    });
  }
}

function render() {
  dismissEdgeTooltip();
  updateHeader();
  updateBreadcrumbs();
  updateSidebar();

  const view = currentView();
  if (!view) return;

  const needsRemount = mountedViewNeedsRemount(view);
  if (needsRemount) mountCurrentView(view);
  syncCurrentViewState({ forceAll: needsRemount });
}

['modeExploreBtn', 'modeCommentBtn'].forEach(function (id) {
  const button = $(id);
  if (!button) return;
  button.addEventListener('click', function () {
    setMode(button.getAttribute('data-mode'), { animate: true });
  });
});

$('themeToggle').addEventListener('click', function () {
  setTheme(currentTheme() === 'dark' ? 'light' : 'dark', true);
});

$('submitBtn').addEventListener('click', submitPayload);

$('commentDialogOverlay').addEventListener('click', function (e) {
  if (isCommentEditingLocked()) return;
  if (e.target !== $('commentDialogOverlay')) return;
  const underlying = elementUnderPopoverClick(e);
  if (!underlying) return;
  if (isPendingTargetMatch(underlying)) return;
  const interactionTarget = underlyingInteractionTarget(underlying);
  if (interactionTarget) {
    const target = commentTargetFromInteractionTarget(interactionTarget);
    if (!target) return;
    openCommentDialog(target, commentAnchorFromEvent(interactionTarget, e));
    return;
  }
  if (underlying.closest('#canvas')) {
    attemptCloseCommentDialog('canvas');
  }
});

$('canvas').addEventListener('click', function (e) {
  if (isCommentEditingLocked()) return;
  if (!isCommentMode()) return;
  if (!e.target.closest('#canvas')) return;
  if (underlyingInteractionTarget(e.target)) return;
  const view = currentView();
  if (!view) return;
  e.preventDefault();
  const target = canvasCommentTarget(view);
  if (!target) return;
  openCommentDialog(target, commentAnchorForCanvasEvent(e));
});

$('commentAdd').addEventListener('click', addPendingComment);

$('commentText').addEventListener('input', function () {
  clearDiscardPrompt();
  autosizeCommentTextarea();
  updateCommentComposerState();
});

$('commentText').addEventListener('keydown', function (e) {
  if (e.key === 'Escape') {
    e.preventDefault();
    e.stopPropagation();
    attemptCloseCommentDialog('escape');
    return;
  }
  if (e.key !== 'Enter' || e.shiftKey || e.altKey || e.isComposing) return;
  if (!e.metaKey && !e.ctrlKey) return;
  e.preventDefault();
  e.stopPropagation();
  addPendingComment();
});

window.addEventListener('resize', function () {
  dismissEdgeTooltip();
  if (state.pendingTarget) positionCommentDialog();
});

$('canvas').addEventListener('scroll', function () {
  dismissEdgeTooltip();
  if (state.pendingTarget) positionCommentDialog();
});

$('payloadClose').addEventListener('click', function () {
  $('payloadOverlay').className = 'overlay';
});

$('payloadOverlay').addEventListener('click', function (e) {
  if (e.target === $('payloadOverlay')) $('payloadOverlay').className = 'overlay';
});

document.addEventListener('click', function (e) {
  if (!state.viewOverviewOpen) return;
  const path = typeof e.composedPath === 'function' ? e.composedPath() : [];
  const clickedInsideOverview = path.some(function (node) {
    return Boolean(
      node
      && node.id
      && (node.id === 'breadcrumbNav' || node.id === 'viewOverviewTrigger' || node.id === 'viewOverviewPopover')
    );
  });
  if (clickedInsideOverview) return;
  closeViewOverview();
});

$('payloadCopy').addEventListener('click', async function () {
  try {
    await navigator.clipboard.writeText($('payloadPre').textContent || '');
  } catch (err) {
    // ignore clipboard failures in restricted environments
  }
});

document.addEventListener('keydown', function (e) {
  if (state.viewOverviewOpen) {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeViewOverview({ focusTrigger: true });
      return;
    }
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      const active = document.activeElement;
      if (isViewOverviewFocusTarget(active)) {
        e.preventDefault();
        focusAdjacentViewOverviewItem(e.key === 'ArrowDown' ? 1 : -1);
        return;
      }
    }
  }

  const key = e.key.toLowerCase();
  const t = e.target;
  if (!e.metaKey && !e.ctrlKey && !e.altKey && !(t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA'))) {
    if (key === 'c') {
      e.preventDefault();
      setMode('comment', { animate: false });
      return;
    }
    if (key === 'e') {
      e.preventDefault();
      setMode('explore', { animate: false });
      return;
    }
  }
  if (e.key === 'Escape') {
    if (state.pendingTarget) {
      e.preventDefault();
      attemptCloseCommentDialog('escape');
      return;
    }
    $('payloadOverlay').className = 'overlay';
  }
});

if (window.matchMedia) {
  const media = window.matchMedia('(prefers-color-scheme: dark)');
  const syncSystemTheme = function (event) {
    if (storedTheme()) return;
    setTheme(event.matches ? 'dark' : 'light', false);
  };
  if (typeof media.addEventListener === 'function') media.addEventListener('change', syncSystemTheme);
  else if (typeof media.addListener === 'function') media.addListener(syncSystemTheme);
}

syncBrandLogo(currentTheme());
updateThemeToggle();
updateCommentComposerState();
render();
</script>
</body>
